name: Validate packages

on:
  pull_request:
    paths:
      - 'packages/**'
  workflow_dispatch:

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate package structure and config
        shell: pwsh
        run: |
          $fail = $false
          $pkgRoot = 'packages'
          # A package dir is any leaf that contains a config/ folder
          $pkgs = Get-ChildItem $pkgRoot -Recurse -Directory |
                  Where-Object { Test-Path (Join-Path $_.FullName 'config') }
          if (-not $pkgs) { Write-Error 'No packages found under packages/'; exit 1 }

          foreach ($p in $pkgs) {
            $rel = Resolve-Path -Relative $p.FullName
            Write-Host "::group::$rel"

            $cfg = Get-ChildItem (Join-Path $p.FullName 'config') -Filter *.json -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $cfg) { Write-Error "$rel : no config/*.json"; $fail = $true; Write-Host '::endgroup::'; continue }

            try { $json = Get-Content $cfg.FullName -Raw | ConvertFrom-Json }
            catch { Write-Error "$rel : config does not parse: $($_.Exception.Message)"; $fail = $true; Write-Host '::endgroup::'; continue }

            if (-not $json.predicates) { Write-Error "$rel : config has no predicates[]"; $fail = $true }
            foreach ($pred in $json.predicates) {
              if ($pred.mode -notin @('Deploy','Seed')) { Write-Error "$rel : predicate '$($pred.name)' has invalid mode '$($pred.mode)'"; $fail = $true }
              if ($pred.providerType -notin @('Content','SqlTable')) { Write-Error "$rel : predicate '$($pred.name)' has invalid providerType '$($pred.providerType)'"; $fail = $true }
            }

            $deploy = Join-Path $p.FullName 'deploy'
            if (-not (Test-Path $deploy) -or -not (Get-ChildItem $deploy -Recurse -File -ErrorAction SilentlyContinue)) {
              Write-Error "$rel : deploy/ is missing or empty"; $fail = $true
            }

            # Seed tree and template manifest are populated by capture; warn only.
            $seed = Join-Path $p.FullName 'seed'
            if (-not (Test-Path $seed) -or -not (Get-ChildItem $seed -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -ne 'README.md' })) {
              Write-Warning "$rel : seed/ has no captured YAML yet (capture pending)"
            }
            if (-not (Test-Path (Join-Path $p.FullName 'templates.manifest.yml'))) {
              Write-Warning "$rel : templates.manifest.yml missing (generated at capture time)"
            }
            if (-not (Test-Path (Join-Path $p.FullName 'BASELINE.md'))) { Write-Warning "$rel : BASELINE.md missing" }

            Write-Host '::endgroup::'
          }

          if ($fail) { Write-Error 'Package validation failed.'; exit 1 }
          Write-Host 'All packages structurally valid.'
