name: E2E round-trip gate

# The merge gate for baseline content. Requires a live DW host + SQL Server, so
# it runs on a self-hosted runner with the source/CleanDB hosts available, or is
# attested by a maintainer in the PR. Not run on hosted runners.
on:
  workflow_dispatch:
    inputs:
      product: { description: 'Product (e.g. swift)', required: true, default: 'swift' }
      version: { description: 'Version (e.g. 2.2)', required: true, default: '2.2' }

jobs:
  roundtrip:
    runs-on: [self-hosted, dw-host]
    steps:
      - uses: actions/checkout@v4

      - name: Full clean round-trip
        shell: pwsh
        env:
          DW_ADMIN_PASSWORD: ${{ secrets.DW_ADMIN_PASSWORD }}
        run: |
          pwsh tools/e2e/full-clean-roundtrip.ps1
          # Pipeline exits 0 only on disposition CLOSED:
          # serialize+deserialize HTTP 200, zero escalations, row-count parity, no orphan YAML.

      - name: Frontend smoke
        shell: pwsh
        run: |
          pwsh tools/smoke/Test-BaselineFrontend.ps1 -HostUrl https://localhost:58217 -AreaId 3

      - name: Publish run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-run-${{ inputs.product }}-${{ inputs.version }}
          path: tools/e2e/runs/**
