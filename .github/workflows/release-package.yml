name: Release package

# Tag a package release as <product>/<semver>, e.g. swift/2.2.0
on:
  push:
    tags:
      - '*/*'
  workflow_dispatch:
    inputs:
      product: { description: 'Product (e.g. swift)', required: true }
      version: { description: 'Version (e.g. 2.2)', required: true }

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package from tag or inputs
        id: pkg
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $product = '${{ inputs.product }}'
            $version = '${{ inputs.version }}'
          } else {
            # tag = refs/tags/<product>/<semver>; package dir uses the source <version> (major.minor)
            $tag = '${{ github.ref_name }}'           # e.g. swift/2.2.0
            $parts = $tag -split '/', 2
            $product = $parts[0]
            $semver  = $parts[1]
            $version = ($semver -split '\.')[0..1] -join '.'   # 2.2.0 -> 2.2
          }
          $dir = "packages/$product/$version"
          if (-not (Test-Path "$dir/config")) { Write-Error "No package at $dir"; exit 1 }
          "product=$product" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "dir=$dir"         >> $env:GITHUB_OUTPUT
          "zip=$product-$version.zip" >> $env:GITHUB_OUTPUT

      - name: Build Upload-ready zip
        shell: pwsh
        run: |
          $dir = '${{ steps.pkg.outputs.dir }}'
          $stage = 'release-stage'
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "$dir/config" "$stage/config" -Recurse
          Copy-Item "$dir/deploy" "$stage/deploy" -Recurse
          if (Test-Path "$dir/seed") { Copy-Item "$dir/seed" "$stage/seed" -Recurse }
          if (Test-Path "$dir/templates.manifest.yml") { Copy-Item "$dir/templates.manifest.yml" $stage }
          @"
          Truvio Commerce Serialized package: ${{ steps.pkg.outputs.product }} ${{ steps.pkg.outputs.version }}

          Install via DW admin: Settings -> Developer -> Serialize -> Upload Package,
          then upload this zip. A pre-flight gate verifies required templates exist
          on the target before anything is written.

          See: https://github.com/justdynamics/Truvio.Commerce.Serializer.Baselines
          "@ | Out-File -Encoding utf8 "$stage/INSTALL.txt"
          Compress-Archive -Path "$stage/*" -DestinationPath '${{ steps.pkg.outputs.zip }}' -Force

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          files: ${{ steps.pkg.outputs.zip }}
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.zip }}
          path: ${{ steps.pkg.outputs.zip }}
