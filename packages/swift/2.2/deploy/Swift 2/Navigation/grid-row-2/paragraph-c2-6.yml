  "Text": "Great views over the valley. This trail ends at the intersection of Middle Earth. Flow trail is a bit tight at the top, but gets really fast as you transition to the lower Rush. Fun! \r\n\r\nYou can find everyone out here having fun from people in body armor and downhill bikes to families testing their kids limits to xc racer types riding intervals. It can be accessed from the base at Old Fort Picnic Grounds or the base of the upper climb. The trails all run parallel to the Fountain Place paved road so they can be shuttled by car. Great trail, with amazing views, but may see a lot of traffic. This trail can be sandy during dry summer months and is best after rain, in the spring or fall."
