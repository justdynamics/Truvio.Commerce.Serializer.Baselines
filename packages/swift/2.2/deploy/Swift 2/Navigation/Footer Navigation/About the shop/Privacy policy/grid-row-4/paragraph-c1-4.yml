  "Text": "<p>We offer certain site features, services, applications, and tools that are available only through the use of the following tracking technologies. You are always free to block, delete, or disable these technologies if your browser, installed application, or device so permits. However, if you decline cookies or other similar technologies, you may not be able to take advantage of certain site features, services, applications, or tools. </p><p>Generally, these technologies allow our sites, services, applications, and tools to store relevant information in your browser or device and later read that information in order to identify you to our servers or internal systems. Where applicable, we protect our cookies and other similar technologies to help ensure that only we and/or our authorized service providers can interpret them by assigning them a unique identifier that is designed for interpretation only by us.</p><p>This website collects and uses personal information for the following reasons:</p><p><strong>1.1. Google Analytics</strong><br>Like most websites, this site uses Google Analytics (GA) to track user interaction. We use this data to determine the number of people using our site, to better understand how they find and use our web pages and to see their journey through the website.</p><p>Although GA records data such as your geographical location, device, internet browser and operating system, none of this information personally identifies you to us. GA also records your computer’s IP address which could be used to personally identify you but Google do not grant us access to this. We consider Google to be a third party data processor (see section 2 below).</p><p>GA makes use of cookies, details of which can be found on <a href=\"https://developers.google.com/analytics/devguides/collection/analyticsjs/cookie-usage\" rel=\"noopener noreferrer\">Google&#39;s developer guides</a>. FYI our website uses the analytics.js implementation of GA.</p><p>Disabling cookies on your internet browser will stop GA from tracking any part of your visit to pages within this website.</p><p>Learn more about <a href=\"https://www.google.com/analytics/\" rel=\"noopener noreferrer\">Google Analytics</a>.</p><p><strong>1.2. Google Tag Manager</strong><br>We are constantly trying to improve the customer experience on our website by providing visitors with more personalized and targeted campaigns and offerings. To do so, we use Google Tag Manager (GTM). </p><p>GTM is a little snippet of code that helps us track user behavior across our sites and then pushes the data to our Google Analytics account. Then, all the data is perfectly organized and ready for us to assess and review for potential site improvements and remarketing campaigns. </p><p>We consider Google to be a third party data processor (see section 2 below).</p><p>Learn more about <a href=\"https://www.google.com/analytics/tag-manager/\" rel=\"noopener noreferrer\">Google Tag Manager</a>.</p><p><strong>1.3. Albacross &amp; Leadfeeder</strong><br>We obtain your consent to the processing of personal data on the behalf of Albacross Nordic AB (“Albacross”) and Liidio Oy / Leadfeeder (&quot;Leadfeeder).</p><p>Information collected from cookies set in your device that qualify as personal data will be processed by Albacross and Leadfeeder, companies offering lead identification and ad targeting services. Please see below for full contact details. </p><p>The purpose for the processing of the personal data is that it enables Albacross and Leadfeeder to improve a service rendered to us and our website (e.g “Lead Generation” service), by adding data to their database about companies. </p><p>The data that is collected and used by Albacross and Leadfeeder to achieve this purpose is information about the IP-address from which you visited our website, and technical information that enables Albacross and Leadfeeder to tell apart different visitors from the same IP-address. Albacross and Leadfeeder stores the domain from form input in order to correlate the IP-address with your employer. </p><p>For the full information about our processing of personal information, please see the full Privacy Policies: <a href=\"https://albacross.com/privacy-policy/\" rel=\"noopener noreferrer\">Albacross Privacy Policy</a> and <a href=\"https://www.leadfeeder.com/privacy/\" rel=\"noopener noreferrer\">Leadfeeder Privacy Policy</a>. </p><p>You may at any time withdraw your consent to this processing. Such withdrawal may be made either by contacting us, or by contacting Albacross or Leadfeeder directly. </p><p><strong>Contact information:</strong></p><p>Albacross Nordic AB<br>Companyreg. no 556942-7338<br>Kungsgatan 26 <br>111 35 Stockholm, Sweden <br><a href=\"http://www.albacross.com/\" rel=\"noopener noreferrer\">www.albacross.com</a> - <a href=\"mailto:contact@albacross.com\" rel=\"noopener noreferrer\">contact@albacross.com</a> </p><p>Liidio Oy / Leadfeeder<br>Company ID 2457101-9<br>Mikonkatu 17 C<br>00100 Helsinki, Finland<br><a href=\"http://www.leadfeeder.com/\" rel=\"noopener noreferrer\">www.leadfeeder.com</a> - <a href=\"mailto:team@leadfeeder.com\" rel=\"noopener noreferrer\">team@leadfeeder.com</a></p><p><strong>1.4. Contact and download forms</strong><br>Should you choose to use the <a href=\"https://www.dynamicweb.com/about/contact-us\" rel=\"noopener noreferrer\">contact form</a>, <a href=\"https://www.dynamicweb.com/resources/downloads\" rel=\"noopener noreferrer\">download gated content</a> or <a href=\"https://www.dynamicweb.com/resources/training-and-events\" rel=\"noopener noreferrer\">sign up for events</a>, then your information will be stored in our Dynamicweb backend and collated into an email and sent to us over the <a href=\"https://en.wikipedia.org/wiki/Simple_Mail_Transfer_Protocol\" rel=\"noopener noreferrer\">Simple Mail Transfer Protocol (SMTP)</a>.</p><p>The information contained in the email will automatically be transfered onwards to our Dynamics 365 CRM system. From there, the data will be attached to any existing account with a similar email or else be created as a new contact. </p><p>All data obtained from any website form will be subject to minimum one yearly review where inactive data – or data belonging to inactive contacts may be deleted from our Dynamicweb backend database. </p><p><strong>1.5. Email newsletter</strong><br>If you choose to join our email newsletter, the email address that you submit to us will be forwarded to SendGrid who provide us with email marketing services. We consider <a href=\"https://sendgrid.com/\" rel=\"noopener noreferrer\">SendGrid</a> to be a third party data processor. In addition to SendGrid, your email will also be stored in our Dynamicweb backend database and in our Dynamics 365 CRM system.</p><p>You can always opt-out by using the unsubscribe link contained in any email newsletters that we send you or by requesting removal via email. When <a href=\"mailto:info@dynamicweb.com\" rel=\"noopener noreferrer\">requesting removal via email</a>, please send your email to us using the email account that is subscribed to the mailing list.</p><p>Your email address and email click history will remain within our own - and in SendGrid&#39;s database for as long as we continue to use SendGrids’s services for email marketing.</p><p>While your email address remains within our own - and in the SendGrid database, you will receive periodic (approximately three times a month) newsletter-style emails from us. Our newsletters will keep you posted on Dynamicweb&#39;s latest product announcements, software updates, and upcoming events.</p><p>If you want your personal data &#39;erased&#39; from our databases, then <a href=\"https://www.dynamicweb.com/Files/Files/Documents/Request_data_removal.pdf\" rel=\"noopener noreferrer\">download and fill out the data removal form</a> step-by-step and send it to us by mail. </p><p>We will respond without undue delay (and in any event within one month from receiving your request, although this can be extended in difficult cases). </p><p>Be aware that all the email logs in SendGrid are kept in their database for 30 days before being fully deleted. </p>"
