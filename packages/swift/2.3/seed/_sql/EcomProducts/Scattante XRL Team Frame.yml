"ProductName": "Scattante XRL Team Frame"
"ProductShortDescription": |
  <p>For those who are serious about the road, the XRL Team frame and fork is in a class of its own when it comes to race-ready performance.</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight 7005 butted, aluminum tubeset is intricately shaped and manipulated for speed with its carbon S-bend stays and teardrop-shaped down tube and top tube</li>
  	<li>Uses the same race-inspired geometry found the 2007 Scattante R-660 Double Road Bike (see item #30-0034) for an excellent balance of predictable handling</li>
  	<li>Carbon fiber fork with aluminum steerer dampen vibrations for a smooth riding experience</li>
  	<li>Small details were not overlooked: look close and you&rsquo;ll find a replaceable dropout, an integrated headset, pro paint and fast graphics</li>
  	<li>Comes complete with a carbon/aluminum fork, integrated headset and CNC machined seat post collar</li>
  </ul>
