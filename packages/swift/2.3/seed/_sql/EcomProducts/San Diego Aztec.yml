"ProductName": "San Diego Aztec"
"ProductShortDescription": |
  <p>Monty&rsquo;s Maniacs are a definite highlight at any SDSU basketball game! From loud, heckling cries to the mocking display of large celebrity faces, these die-hard fans in the student section sure know how to taunt and terrify the visiting team! So why not join the fun and support the Aztecs by riding this tough and durable cruiser with its Red and Black team colors. You never know&hellip;it could be you in that banana suit at the next game!</p>
"ProductLongDescription": |
  <ul>
  	<li>Hi-Ten steel frame is lightweight, strong and resilient</li>
  	<li>Bullhorn handlebars with leather grips keep you riding in comfort and relaxed style</li>
  	<li>Single speed drivetrain is simple and uncomplicated to maintain</li>
  	<li>Dual spring saddle adds comfort to your backside</li>
  	<li>Rubber Block platform pedals make this bike easy to ride</li>
  	<li>Kenda Cruiser tires roll smoothly over flat or rough terrain</li>
  	<li>Rear coaster brake delivers rapid braking power in any condition</li>
  	<li>Fits anyone up to 6’6</li>
  </ul>
