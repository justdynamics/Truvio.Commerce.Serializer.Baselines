"ProductName": "GT Marathon 2.0 Mountain Bike"
"ProductShortDescription": |
  <p>This bike will have you turning those &ldquo;short afternoon rides&rdquo; into &ldquo;epic trail runs&rdquo; thanks to its climb-friendly setup! GT&rsquo;s patented Independent Drivetrain system eliminates pedal feedback, so you can go longer and harder. Add on the bump-absorbing, dual suspension from Rock Shox and Fox, a Shimano 27-speed drivetrain, disc wheels and Kenda tires that grip like a vice, and you&rsquo;ll start to wonder how you ever rode less than four hours a day!</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight, durable aluminum frame with i-Drive system provides unbeatable pedaling power and efficiency</li>
  	<li>4&rdquo; of rear wheel travel offer comfort and control over uneven terrain</li>
  	<li>Rock Shox Recon 351 Air front suspension paired up with Fox Float R rear shock smoothes out all the rough stuff on the trail</li>
  	<li>Shimano LX 27-speed drivetrain delivers sharp, powerful shifts and includes plenty of gears for the hills and flats</li>
  	<li>Ritchey aluminum handlebar, stem and seatpost for core-level strength, style and performance</li>
  	<li>Hydraulic disc brakes supply excellent stopping power in any condition</li>
  	<li>Crank Brothers Candy C pedals add stability and easy in/easy out convenience</li>
  	<li>WTB Rocket V Comp saddle offers plenty of cushioning for day-long rides</li>
  	<li>WTB SpeedDisc XC rims with Kenda Nevegal tires flatten every obstacle in your path and are built to withstand all sorts of abuse</li>
  </ul>
