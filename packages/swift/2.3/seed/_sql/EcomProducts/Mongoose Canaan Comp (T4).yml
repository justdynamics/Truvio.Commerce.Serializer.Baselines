"ProductName": "Mongoose Canaan Comp (T4)"
"ProductShortDescription": |
  <p>“If you’re looking for <strong>one bike </strong>that’ll tackle any sort of riding with enthusiasm, help you out when speed overruns skill and make sure you finish every ride grinning, we’d go for ‘Goose’s golden egg!” - Mountain Biking Magazine, get it now.</p>
"ProductLongDescription": |
  <ul>
  	<li>Aluminum frame with FreeDrive design and slightly relaxed 69.5° head angle tackles loose-over-hard terrain with ease and responds quickly when its time to pick up speed</li>
  	<li>Rock Shox Tora 318 Air fork with 100mm of travel delivers smooth, predictable and reliable bump absorption over uneven terrain</li>
  	<li>Fox Float R gives you a wide range of compression control for incredibly accurate suspension tuning</li>
  	<li>Shimano XT drivetrain provides flawless shifting and performance on all types of terrain</li>
  	<li>Hayes Stroker Trail hydraulic disc brakes guarantee rapid and controlled stopping power in any condition</li>
  	<li>WTB Speed Disc XC rims with Shimano M525 hubs and Kenda Small Block Eight DCT tires offer the lightweight stability and traction you need on technical trails</li>
  </ul>
