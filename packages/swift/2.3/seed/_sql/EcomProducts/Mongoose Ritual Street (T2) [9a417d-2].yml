"ProductName": "Mongoose Ritual Street (T2)"
"ProductShortDescription": "<p>If you want baptism by air, here&rsquo;s your ride. Not only does this bike clear big jumps with ease, its tough, chromoly frame feels nearly weightless when you&rsquo;re off the ground! Add on 100mm of front suspension to cushion the drops and 3-piece cranks for that sweet barspin.&nbsp;</p>"
"ProductLongDescription": |-
  <ul>
  <li>Heavy-duty chromoly frame provides extra strength for jumps at the park</li>
  <li>RST Space Jump offers 100mm of plush suspension for those hard hits</li>
  <li>Heat treated, tubular chromoly 3-piece cranks guarantee a stiff and durable ride</li>
  <li>Conical washers let you covert this single spxeed ride to an 8/9 spxeed bike</li>
  <li>Hayes MX4 mechanical disc brakes deliver low maintenance, all-weather stopping power</li>
  <li>Kenda K-Rad and Kenda Kiniption tires are designed for aggressive street jumping</li>
  <li>Sun Ditch Witch rims with Mongoose rear disc hubs are built to withstand those tough landings on the pavement.</li>
  </ul>
