"ProductName": "Mavic Crossmax SLR Disc Rear Wheel"
"ProductShortDescription": |
  <p>Take the incredible spec list from the Crossmax SL, add a titanium quick release, plus some fast racing graphics and you get the Crossmax SLR &ndash; the World&rsquo;s highest performing cross country race-wheel.</p>
"ProductLongDescription": |
  <ul>
  	<li>UST tubeless wheel is Maxtal ISM lightened with an SUP welded rim for serious weight reduction, less vibration and fewer flats over rough terrain</li>
  	<li>Fore technology adds greater rigidity and stiffness to the rim</li>
  	<li>Red FTS-X cassette body boasts strengthened prawls and self-locking axle end screws to meet the demands of hard wearing, MTB riding</li>
  	<li>24 (Isopulse) Zicral, short spokes (with one red) reduce tension cycles, balance spokes tensions from side to side, reduce material fatigue and improve wheel endurance</li>
  	<li>Shimano 8/9-speed compatible</li>
  	<li>Compatible with UST and standard tires/tubes</li>
  </ul>
