"ProductShortDescription": "<p>Si vous souhaitez un baptême par voie aérienne, voici votre trajet. Non seulement ce vélo franchit facilement de gros sauts, mais son cadre robuste en chromoly semble presque en apesanteur lorsque vous décollez du sol ! Ajoutez une suspension avant de 100 mm pour amortir les chutes et des manivelles en 3 pièces pour une douce rotation du guidon.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Le cadre en chromoly robuste offre une résistance supplémentaire pour les sauts au parc</li>
  <li>Le RST Space Jump offre une suspension souple de 100 mm pour les coups violents</li>
  <li>Les manivelles tubulaires en chromoly 3 pièces traitées thermiquement garantissent une conduite rigide et durable</li>
  <li>Les rondelles coniques vous permettent de convertir ce trajet simple en un vélo 8/9 vitesses</li>
  <li>Les freins à disque mécaniques Hayes MX4 offrent une puissance de freinage nécessitant peu d'entretien et par tous les temps</li>
  <li>Les pneus Kenda K-Rad et Kenda Kiniption sont conçus pour les sauts de rue agressifs</li>
  <li>Les jantes Sun Ditch Witch avec moyeux à disque arrière Mongoose sont conçues pour résister aux atterrissages difficiles sur le trottoir.</li>
  </ul>
