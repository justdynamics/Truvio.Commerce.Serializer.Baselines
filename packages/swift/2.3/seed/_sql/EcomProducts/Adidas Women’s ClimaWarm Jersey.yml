"ProductName": "Adidas Women’s ClimaWarm Jersey"
"ProductShortDescription": |
  <p>When cold weather hits, it can be hard to stay motivated. And there are those days when you just want to snuggle down in your sofa with a hot cup of cocoa and your favorite, warm blanket. But Adidas will get you off the couch and into this long sleeve jersey that promises the warmth, comfort and softness of a lazy day indoors.</p>
"ProductLongDescription": |
  <ul>
  	<li>ClimaWarm fabric with a super-soft interior keeps you dry and comfortable by trapping warm air close to the skin while allowing sweat to escape through evaporation &ndash; all this, with no extra bulk plus a flattering fit!</li>
  	<li>Full length zipper lets you regulate your core temperature</li>
  	<li>Longer tail offers extra coverage when you&rsquo;re in the riding position</li>
  	<li>Reflective stripes enhance visibility</li>
  	<li>Three rear pockets with one zippered pocket store all your cold weather essentials</li>
  </ul>
