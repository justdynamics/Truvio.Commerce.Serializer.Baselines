"ProductName": "Mongoose Ritual Street (T2)"
"ProductShortDescription": "<p>Wenn Sie sich auf dem Luftweg taufen lassen möchten, finden Sie hier Ihre Fahrt. Dieses Fahrrad meistert nicht nur große Sprünge mit Leichtigkeit, sein robuster Chromoly-Rahmen fühlt sich auch fast schwerelos an, wenn Sie vom Boden abheben! Fügen Sie eine 100-mm-Vorderradaufhängung hinzu, um die Drops abzufedern, und dreiteilige Kurbeln für den tollen Barspin.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Hochbelastbarer Chromoly-Rahmen sorgt für zusätzliche Stabilität bei Sprüngen im Park</li>
  <li>RST Space Jump bietet 100 mm weiche Federung für harte Schläge</li>
  <li>Wärmebehandelte, dreiteilige röhrenförmige Chromoly-Kurbeln garantieren ein steifes und langlebiges Fahrverhalten</li>
  <li>Mit konischen Unterlegscheiben können Sie dieses einzelne Spxeed-Fahrrad in ein 8/9-Spxeed-Fahrrad umwandeln</li>
  <li>Die mechanischen Scheibenbremsen Hayes MX4 bieten wartungsarme Bremsleistung bei jedem Wetter</li>
  <li>Kenda K-Rad- und Kenda Kiniption-Reifen sind für aggressives Straßenspringen konzipiert</li>
  <li>Sun Ditch Witch-Felgen mit Mongoose-Hinterradnaben sind so konstruiert, dass sie auch harten Landungen auf dem Bürgersteig standhalten.</li>
  </ul>
