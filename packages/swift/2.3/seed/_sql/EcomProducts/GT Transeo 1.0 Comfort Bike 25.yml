"ProductName": "GT Transeo 1.0 Comfort Bike 25"
"ProductShortDescription": |
  <p>The Transeo 1.0 has everything you&rsquo;ve been looking for! It&rsquo;s lightweight, thanks to the 7005 aluminum frame with hydroformed top tube and cold forged 3D dropouts. It&rsquo;s fast, due to the 700c wheels that&rsquo;ll keep you on the go. It&rsquo;s powerful, because the linear-pull brakes will stop you in your tracks. It&rsquo;s comfortable, because it boasts an anatomical saddle and soft grips. Each of these features compliments the upright geometry and ergonomics of this fitness machine perfectly.</p>
"ProductLongDescription": |
  <ul>
  	<li>GT 7000 Series butted aluminum frame with Sport Fitness Geometry is built for lightweight speed and durable comfort</li>
  	<li>Suspension fork smoothes out the rough stuff on the road or trail</li>
  	<li>Shimano/SRAM 27-speed drivetrain with RapidFire shifting gives you quick access to plenty of gearing options</li>
  	<li>Selle San Marco Ischia K saddle and dual density grips add comfort over uneven terrain</li>
  	<li>ProMax direct-pull brakes provide excellent stopping power</li>
  	<li>WTB All Terrainasaurus tires are perfect for rough roads and packed trails</li>
  	<li>Double wall Alex rims with Shimano hubs maintain strength and rigidity</li>
  </ul>
