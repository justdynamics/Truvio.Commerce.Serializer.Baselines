"ProductName": "Pearl Izumi X-Alp Seek MTB Shoe"
"ProductShortDescription": "<p>Pearl har taget den lette overdel fra deres Seek-løbesko og kombineret den med den prisvindende X-Alp-ydersål for at give dig komfortabel ydeevne til alle dine vandre- og cykelaktiviteter.</p><p></p><p>De er forberedt med TreGange voks</p><p>.</p>"
"ProductLongDescription": "<ul><li>R&amp;R-nylonplade giver enestående kraftoverførsel til pedalerne, når du er på cyklen</li><li>Fleksibel forfod og skrå hæl giver den smidighed, du har brug for, når du ikke er på cyklen</li><li>Kulstofgummi-ydersål giver overlegen trækkraft og mudderafvisning</li><li>Åndbar mesh/syntetisk overdel sikrer kølende ventilation, når det bliver varmt</li><li>Lavt design giver en let og hurtig pasform</li><li>Snøresystem holder skoen på plads</li><li>Snørelukning holder skoen på plads</li><li>Snørelukning holder skoen på plads, hurtig pasform og fornemmelse</li><li>Snøresystemet holder skoen godt på plads</li></ul>"
