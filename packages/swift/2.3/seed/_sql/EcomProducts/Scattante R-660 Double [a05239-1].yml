"ProductName": "Scattante R-660 Double "
"ProductShortDescription": |
  <p>With show-stopping speed and spec&rsquo;d out at a price that can&rsquo;t be beat, this ride is sure to exceed your expectations. Lightweight aluminum frame, carbon fiber fork, race-ready Ultegra components and powerful FSA cranks deliver a ride so smooth, so fast and so hill-smashingly easy&hellip;you&rsquo;ll just keep coming back for more.</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight aluminum frame with carbon fork offers a stiff and efficient ride with less vibration</li>
  	<li>Shimano Ultegra drivetrain blends race-proven technology with ergonomic perfection to give you a new level of shifting performance</li>
  	<li>FSA cranks with 12/25 cassette delivers the right amount of gearing for the hills and the flats</li>
  	<li>Carbon/aluminum seatpost with aluminum handlebar and stem supply core-level strength, style and lightweight performance</li>
  	<li>Kenda tires keep you moving along at high speeds while remaining exceptionally quiet against the pavement</li>
  	<li>Alex ALX 440 SL wheelset cuts through the wind with bladed spokes, aero rims and smooth rolling hubs</li>
  	<li>Tektro R570 dual pivot calipers deliver strong, progressive stopping power and good modulation</li>
  </ul>
