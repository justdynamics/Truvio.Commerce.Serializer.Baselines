"ProductName": "Pearl Izumi Women’s Whisper Vest"
"ProductShortDescription": "<p>From gusty winds to drizzling rain, this outer shell delivers the perfect amount of protection for early Spring and Fall riding.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Shields you from the elements when you need it and stows in a pocket when you don&rsquo;t!</li>
  <li>Pearl Izumi&rsquo;s Zephrr-Micro fabric now features even more wind-resistance, water-repellency, breathability and softness, plus new design lines for a more flattering fit</li>
  <li>Soft, micromesh collar ensures comfortable warmth</li>
  <li>Full length zipper with draft flap blocks cold winds</li>
  <li>Mesh back inserts add just enough ventilation to prevent overheating</li>
  <li>Reflective piping and logos keep you visible in low light conditions</li>
  <li>Elasticized arm holes and waist lock in heat</li>
  <li>Rear stow pocket with internal key pocket for stashing the essentials</li>
  </ul>
