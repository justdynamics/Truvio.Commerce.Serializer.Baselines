"ProductName": "Cannondale L.E. Foul Weather Tight"
"ProductShortDescription": |
  <p>Looking out your window on a cold winter morning usually produces a mental list of excuses as to why it would be better to stay in bed. So when we stumbled upon Cannondale&rsquo;s Foul Weather tight, were surprised and delighted to find that it gave us many more reasons to head outside!</p>
"ProductLongDescription": |
  <ul>
  	<li>Thermal HydroGrid fabric with 4-way stretch provides full water and windproof protection and unsurpassed breathability and flexibility; especially where your joints need the most mobility</li>
  	<li>Strategic seam construction follows your muscular-skeletal pattern for unparalleled fit, range of motion and comfort</li>
  	<li>Reflective accents offer 360&deg; of visibility</li>
  	<li>Knee gussets further enhance flexibility</li>
  	<li>10&rdquo; leg zippers make it easy to get in and out of these tights</li>
  	<li>Drawstring waist gives you a custom fit</li>
  	<li>Internal stash pocket at hip will hold your cash, credit cards or keys</li>
  </ul>
