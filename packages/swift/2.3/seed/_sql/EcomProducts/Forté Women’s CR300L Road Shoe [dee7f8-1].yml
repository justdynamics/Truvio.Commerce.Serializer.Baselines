"ProductName": "Forté Women’s CR300L Road Shoe"
"ProductShortDescription": |
  <p>Gear up for the road ahead in this performance-ready shoe created for female cyclists.</p>
"ProductLongDescription": |
  <ul>
  	<li>Forte&rsquo;s exclusive women&rsquo;s-specific design provides a custom fit and superior comfort for the female foot</li>
  	<li>Co-molded composite outsole with vented, fiberglass reinforced nylon provides the stiffness you need to pedal efficiently</li>
  	<li>Lightweight, PU coated leather and nylon mesh panels add durability and breathability</li>
  	<li>Stabilizing, molded heel cup and vented, E.V.A. insole is contoured for comfortable, foot retention</li>
  	<li>Two Velcro straps and one ratchet with strap firmly secures your foot for maximum stability, leverage and performance</li>
  	<li>3M Scotchlite reflective panels ensure visibility in low light conditions</li>
  </ul>
