"ProductName": "Schwinn Sid Coasting Bike"
"ProductShortDescription": "<p>Hvis du vil have luftdåb, så er det her din cykel. Ikke alene klarer denne cykel store hop med lethed, dens robuste chromoly-stel føles næsten vægtløst, når du er oppe af jorden! Tilføj 100 mm affjedring foran til at dæmpe droppene og 3-delte kranksæt til det søde barspin, og du har en cykel, der kan klare alt på jorden eller i luften.</p>"
"ProductLongDescription": "<ul><li>Schwinn Classic Sport rammedesign med Schwinn Tourister styr giver dig en naturlig oprejst position for komfortabel kørsel</li><li>Hajtænder, stålskærme og støttefod arbejder sammen for at holde din cykel i topform</li><li>Shimano Coasting komponenter med et 3-trins automatisk skiftesystem og coasterbremse tager tankerne ud af gearskift og giver sikre stop</li><li>Schwinn Sport sadel giver blød støtte til dine boller</li><li>Smooth cruiser dæk giver en let rullende, komfortabel oplevelse</li><li>Lette og korrosionsbestandige alufælge med eger i rustfrit stål giver ekstra holdbarhed</li><li>Bagagebærer med plads til alt, hvad du skal bruge til en dag med uforsigtig sjov</li></ul>"
