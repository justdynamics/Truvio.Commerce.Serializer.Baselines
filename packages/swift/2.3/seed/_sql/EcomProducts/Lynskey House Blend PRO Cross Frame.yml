"ProductName": "Lynskey House Blend PRO Cross Frame"
"ProductShortDescription": |
  <p>Specifically designed to provide exceptional handling and control over rough terrain, this competitive, cyclocross frame will have you racing through courses with precision and speed!</p>
"ProductLongDescription": |
  <ul>
  	<li>Proprietary tube shaping process gives this oversized, triple-butted, brushed finish titanium frame incredible stiffness, power transfer and compliance</li>
  	<li>Bi-Axially formed downtube enhances bottom bracket rigidity</li>
  	<li>S-bend chainstays and enhanced bottom bracket provide enough crankarm/heel clearance for extremely muddy courses</li>
  	<li>S-bend seatstays position the cantilever brakes for optimum stopping performance</li>
  	<li>Cantilever brake mounts with a fully centered cable stop make brake adjustment a cinch</li>
  	<li>Toptube cable routing keeps the inner triangle clear for shouldering</li>
  	<li>135mm rear spacing accommodates a wide range of rear hub and gearing options</li>
  </ul>
