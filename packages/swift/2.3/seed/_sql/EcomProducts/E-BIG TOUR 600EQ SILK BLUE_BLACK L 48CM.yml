"ProductName": "E-BIG TOUR 600EQ SILK BLUE/BLACK L 48CM"
"ProductShortDescription": "<p><strong>MOUNTAIN BIKE TREKKING AT ITS BEST&thinsp;</strong><br>The eBIG.TOUR EQ combines the best of two worlds in the MERIDA line-up. From the outside a mountain bike but a trekking bike at heart. With a frame based on the eBIG.NINE, a suspension fork and wider 29er MTB tyres, the bike delivers a more comfortable riding feeling than a conventional trekking bike. However, as it comes fully equipped with fenders, carrier and lights, it is ideal for all tasks and duties you normally expect from a trekking bike or hybrid. The heavily bent down top tube offers incredible stand over height for easy mount and dismount.</p>"
"ProductLongDescription": "<ul><li>MERE KRAFT OG RÆKKEVIDDE - Shimano&#39;s EP8-motor giver en perfekt afbalanceret kraftoverførsel med op til 85 Nm og har yderligere forbedret størrelse, vægt, støj og motormodstand. Det nye 630 Wh batteri er perfekt integreret i det hydroformede underrør og giver en imponerende rækkevidde til endnu længere omveje hjem.</li><li>GO BIG - eBIG.TOUR EQ ruller på 29er-hjul, som har en fantastisk \"rullende over forhindringer\"-adfærd. Som standard er den udstyret med 2,2&quot; brede dæk, som giver masser af greb og komfort. Hvis der ikke er monteret skærme, kan dækkene gå op til 2,35&quot; hvilket forbedrer offroad-køreegenskaberne yderligere.</li><li>VANDBÆRER - eBIG.TOUR EQ-rammen giver mulighed for at montere en vandflaske eller andet tilbehør som en lås eller pumpe i to forskellige positioner. Den ene er på toppen af underrøret, mens den anden er under overrøret. Det giver rytteren mulighed for, udover at montere flaskeholdere, at montere f.eks. en foldelås eller et pumpebeslag. </li><li>SYSTEMVÆGT - En cykels systemvægt er den kombinerede vægt af cykel, rytter og ekstra bagage. Den tilladte systemvægt er 140 kg. Da en elcykel allerede er tungere end en almindelig cykel, og da den også gør det lettere at transportere større mængder bagage, er det vigtigt at certificere en højere samlet systemvægt. Alle MERIDA elcykler og alle brugte komponenter gennemgår en streng og elcykelspecifik testplan, som efterligner de højere kræfter og belastninger for at garantere rytteren det højeste sikkerhedsniveau.</li><li>FÅ DEN RIGTIGE REJSE - 100 mm foran giver masser af komfort, samtidig med at du har masser af reserver, når du vælger en mere \"off-road\" rute hjem. I sidste ende opfordrer e-MTB'er rytteren til at køre \"off the beaten track\", når det er muligt.</li></ul><p></p>"
