"ProductName": "UC Davis Aggies Lady"
"ProductShortDescription": "<p>&ldquo;Loyal Aggies, all for one, never stopping &lsquo;till we&rsquo;ve won!&rdquo; - a verse from a favorite UC Davis fight song that&rsquo;s led by the Aggie Pack, the largest student-run spirit association in the United States. And thanks to this tough and durable cruiser with USD team colors, now you can give your very own &ldquo;shout-out&rdquo; for the Blue and Gold!</p>"
"ProductLongDescription": |-
  <ul>
  <li>Hi-Ten steel frame is lightweight, strong and resilient</li>
  <li>Bullhorn handlebars with leather grips keep you riding in comfort and relaxed style - perfect for mounting baskets and bells</li>
  <li>Single speed drivetrain is simple and uncomplicated to maintain</li>
  <li>Dual spring saddle adds comfort to your backside</li>
  <li>Rubber Block platform pedals make this bike easy to ride</li>
  <li>Kenda Cruiser tires roll smoothly over flat or rough terrain</li>
  <li>Rear coaster brake delivers rapid braking power in any condition</li>
  <li>Full steel fenders help your ride stay clean, dry and eliminate &ldquo;spray&rdquo; in wet conditions</li>
  <li>Fits anyone over 5&rsquo;0</li>
  </ul>
