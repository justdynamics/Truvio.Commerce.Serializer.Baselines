"ProductShortDescription": "<p>Ef þú vilt skíra með flugi, þá er ferðin þín hér. Þetta hjól hreinsar ekki aðeins stór stökk með auðveldum hætti, heldur er sterkur, krómóluðu ramminn næstum þyngdarlaus þegar þú ert frá jörðu niðri! Bættu við 100 mm af fjöðrun að framan til að draga úr dropunum og 3ja sveifunum fyrir þennan sæta barspin.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Þungur chromoly rammi veitir aukinn styrk fyrir stökk í garðinum</li>
  <li>RST Space Jump býður upp á 100 mm af plush fjöðrun fyrir erfið högg</li>
  <li>Hitameðhöndluð, pípulaga krómólý 3ja sveifar tryggja stífa og endingargóða ferð</li>
  <li>Keilulaga þvottavélar gera þér kleift að leyna þessa einu spxeed ferð í 8/9 spxeed hjól</li>
  <li>Hayes MX4 vélrænni diskabremsur skila litlu viðhaldi, stöðvunarkrafti í öllu veðri</li>
  <li>Kenda K-Rad og Kenda Kiniption dekk eru hönnuð fyrir árásargjarn götustökk</li>
  <li>Sun Ditch Witch felgur með Mongoose diskahúfum að aftan eru byggðar til að standast erfiðar lendingar á gangstéttinni.</li>
  </ul>
