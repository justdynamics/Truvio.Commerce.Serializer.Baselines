"ProductName": "Mongoose Ritual Street (T2)"
"ProductShortDescription": "<p>Hvis du vil have dåb med luft, så er din tur her. Ikke kun klarer denne cykel store hop med lethed, dens hårde, kromoly-ramme føles næsten vægtløs, når du er fra jorden! Tilføj 100 mm frontophæng for at dæmpe faldene og 3-delte håndsving til den søde barspin.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Kromoly-ramme giver ekstra styrke til hop i parken</li>
  <li>RST Space Jump tilbyder 100 mm plys affjedring til de hårde slag</li>
  <li>Varmebehandlet, rørformet kromoly 3-delt håndsving garanterer en stiv og holdbar tur</li>
  <li>Koniske skiver giver dig mulighed for at skjule denne enkelt spxeed-tur til en 8/9 spxeed-cykel</li>
  <li>Hayes MX4 mekaniske skivebremser leverer lav vedligeholdelse, standsekraft i al slags vejr</li>
  <li>Kenda K-Rad og Kenda Kiniption dæk er designet til aggressiv street jumping</li>
  <li>Sun Ditch Witch-fælge med Mongoose bageste skivenav er bygget til at modstå de hårde landinger på fortovet.</li>
  </ul>
