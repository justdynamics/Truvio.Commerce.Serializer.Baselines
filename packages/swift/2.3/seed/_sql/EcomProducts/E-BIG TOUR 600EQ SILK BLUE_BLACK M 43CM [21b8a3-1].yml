"ProductName": "E-BIG TOUR 600EQ SILK BLUE/BLACK M 43CM"
"ProductShortDescription": "<p><strong>MOUNTAIN BIKE TREKKING AT ITS BEST&thinsp;</strong><br>The eBIG.TOUR EQ combines the best of two worlds in the MERIDA line-up. From the outside a mountain bike but a trekking bike at heart. With a frame based on the eBIG.NINE, a suspension fork and wider 29er MTB tyres, the bike delivers a more comfortable riding feeling than a conventional trekking bike. However, as it comes fully equipped with fenders, carrier and lights, it is ideal for all tasks and duties you normally expect from a trekking bike or hybrid. The heavily bent down top tube offers incredible stand over height for easy mount and dismount.</p>"
"ProductLongDescription": |-
  <ul>
  <li>MEHR KRAFT UND REICHWEITE - Shimanos EP8-Motor bietet eine perfekt ausbalancierte Kraftentfaltung mit bis zu 85 Nm und wurde hinsichtlich Größe, Gewicht, Geräuschentwicklung und Motorwiderstand weiter verbessert. Der neue 630-Wh-Akku ist perfekt in das hydrogeformte Unterrohr integriert und liefert eine beeindruckende Reichweite für noch längere Umwege nach Hause.<br />GO BIG - Das eBIG.TOUR EQ rollt auf 29er-Laufrädern, die ein fantastisches &lsquo;Abrollverhalten über Hindernisse&rsquo; aufweisen. Serienmäßig ist er mit 2,2" breiten Reifen ausgestattet, die viel Grip und Komfort bieten. Wenn keine Schutzbleche montiert sind, können die Reifen bis zu 2,35" breit sein, was die Fahreigenschaften im Gelände noch weiter verbessert.<br />WASSERTRÄGER - Der eBIG.TOUR EQ Rahmen bietet die Möglichkeit, eine Wasserflasche oder weiteres Zubehör wie ein Schloss oder eine Pumpe in zwei verschiedenen Positionen zu montieren. Eine befindet sich oben auf dem Unterrohr, die zweite unterhalb des Oberrohrs. Dies gibt dem Fahrer neben der Möglichkeit, Flaschenhalter zu montieren, auch die Option, z.B. ein Faltschloss oder eine Pumpenhalterung zu montieren.<br />SYSTEMGEWICHT - Das Systemgewicht eines Fahrrads ist das kombinierte Gewicht von Fahrrad, Fahrer und zusätzlichem Gepäck. Das zulässige Systemgewicht beträgt 140 kg. Da ein E-Bike bereits schwerer ist als ein normales Fahrrad und es zudem den Transport größerer Mengen an Gepäck erleichtert, ist es zwingend erforderlich, ein höheres Gesamtsystemgewicht zu zertifizieren. Alle MERIDA e-Bikes sowie alle verwendeten Komponenten durchlaufen ein strenges und e-Bike-spezifisches Testprogramm, das die höheren Kräfte und Belastungen nachbildet, um dem Fahrer ein Höchstmaß an Sicherheit zu garantieren.<br />GET THE RIGHT TRAVEL - 100 mm Federweg vorne bieten viel Komfort und gleichzeitig genügend Reserven, wenn man sich für einen eher "off-road&rsquo; Weg nach Hause entscheidet. Schließlich ermutigen e-MTBs den Fahrer dazu, &lsquo;abseits der ausgetretenen Pfade&rsquo; zu fahren, wann immer es möglich ist.</li>
  </ul>
