"ProductShortDescription": "<p>Ideaal voor fietspaden, landwegen en uitstapjes naar de stad, deze easy-rider maakt gebruik van cross/comfort geometrie, inside-the-stays schijfbevestigingen en semi-agressieve banden om je uitzonderlijk comfort en prestaties te geven waar je ook rijdt.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Mongoose aluminium frame met cross/comfort geometrie zet je in een meer rechtopstaande positie voor gemakkelijk trappen</li>
  <li>63mm luchtgeveerde voorvering geeft je comfort op oneffen terrein</li>
  <li>FSA Alpha Drive triple cranks met SRAM/SR Suntour aandrijving biedt veel versnellingsmogelijkheden voor de heuvels en het vlakke</li>
  <li>Mongoose aluminium stuur, zadelpen en stuurpen leveren kracht, stijl en prestaties</li>
  <li>Tektro IO mechanische schijfremmen leveren snelle en gecontroleerde remkracht onder alle omstandigheden</li>
  <li>Ritchey SpeedMax Delta banden houden je stevig op de weg of op de trail</li>
  <li>Duurzame Alex velgen met Formula naven zorgen voor stevigheid en stijfheid, wat je ook tegenkomt</li>
  <li>Ergo Comfort Dual Density handvatten en Mongoose Performance Hybrid zadel zorgen voor extra demping</li>
  </ul>
