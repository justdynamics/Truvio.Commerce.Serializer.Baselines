"ProductShortDescription": |
  <p>K2&rsquo;s commuter machine, with features to make sure you&#39;re seen!</p>
"ProductLongDescription": |
  <ul>
  	<li>Butted cross frame with Reflex Road tuning and aluminum fork gives you a lightweight and resilient ride</li>
  	<li>K2 Bike Fit System stem supplies personalized bar height without the extra weight</li>
  	<li>Shimano 27-speed drivetrain offers an efficient gear ratio for every situation</li>
  	<li>Gear indicators in the Shimano Sora S.T.I. shifters eliminate shifting confusion</li>
  	<li>Selle Royal Dardo saddle with padding and K2 weather-resistant gel tape increase comfort and control</li>
  	<li>LED light on the saddle cover, lighted end plugs and reflective tire stripes add visibility in low light conditions</li>
  	<li>Cantilever brakes are UCI legal and still allow for a wide tire clearance</li>
  	<li>Vittoria Adventure Tour tires add traction and control in wet conditions</li>
  	<li>Rear rack mounts let you add a rack when you need to transport extra gear</li>
  </ul>
