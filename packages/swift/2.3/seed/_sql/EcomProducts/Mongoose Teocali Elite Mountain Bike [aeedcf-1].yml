"ProductName": "Mongoose Teocali Elite Mountain Bike"
"ProductShortDescription": |
  <p>Mongoose shaved some weight off of last year&rsquo;s Teocali frame and still managed to add beefier pivots and bearings to the 5.7 inches of tried and true FreeDrive rear wheel suspension. With an Easton cockpit, a heavy dose of Shimano/SRAM components and tough WTB wheels, this sharply dressed bike is perfectly built for those all-mountain, all-day-in-the-saddle rides.</p>
"ProductLongDescription": |
  <ul>
  	<li>FreeDrive All Mountain 6061 aluminum full suspension frame with Zero Stack headset, forged dropouts, disc mount, replaceable derailleur hanger, anodized finish and 5.7&rdquo; rear travel delivers super-stiff, lightweight and durable performance for all your epic backcountry adventures</li>
  	<li>Marzocchi XC600 TST-2 front suspension offers 140mm of travel and uses a top mounted 2-position compression adjuster to adjust for trail conditions and riding style</li>
  	<li>Fox Float RP/2 rear shock with two-piston ProPedal allows on-the-fly tuning for changing terrain while smoothing out the rough spots</li>
  	<li>SRAM X.7 Impulse Triggers and X.9 rear derailleur provide incredibly smooth, precise indexing and control</li>
  	<li>Shimano Hollowtech II cranks put pedaling power, acceleration and speed right at your feet</li>
  	<li>Easton aluminum handlebars, stem and Mongoose seatpost deliver core-level strength, style and performance</li>
  	<li>Hayes Stroker Trail V6 hydraulic disc brakes guarantee rapid, controlled and perfectly modulated stopping power in any condition</li>
  	<li>WTB Speed Disc All Mountain rims with 20mm hubs and Kenda Nevegal tires are built to handle anything you can dish out on the trail</li>
  </ul>
