"ProductName": "E-ONE SIXTY 10K GLOSSY SPARKLING BLUE/MATT BLUE L 47CM"
"ProductShortDescription": "<p><strong>eONE -SIXTY - PRISVINDENDE MAGT</strong><br /> Vores flere prisvindende elektriske enduro cykel. Den perfekte kombination af Shimano STEPS kraftenheden og den moderne geometri i vores One-Sixty MTB garanterer vores eOne-Sixty en kraftfuld, naturlig ridefølelse. MBR Magazine udtalte: &quot;Merida har gjort et fantastisk stykke arbejde med eOne-Sixty 900E. Den har en sjov, legende kvalitet, som få eBikes kan matche&quot;.</p>"
"ProductLongDescription": "<p><strong>FLOAT LINK SUSPENSION -</strong> Det nedre stødfæste bevæger sig med systemet for at levere overdådighed og pedaleffektivitet. Vores ingeniører kan præcist påvirke transmissionsforholdet og progressionen, hvilket betyder, at et &#39;Float Link&#39; system er meget følsomt, hvilket giver stor støtte i midten af rejsen og udseendet af flere rejser, som modelnavnet antyder. Bagenden skaber følelsen af næsten bundløse rejser, mens den forbliver perfekt kontrolleret, når du klatrer.<br /> <strong>BEVISET DESIGN -</strong> Vores ONE -SIXTY er fortsat en af de største showstoppere i vores fulde affjedringsserie. Helt hjemme på de krævende baner i Enduro World Series, redet af Toni Ferreiro, har vores ONE-SIXTY også fået presseudmærkelser. FLOW kalder det &#39;en ægte konkurrent som den bedste trailcykel, vi har kørt til dette prispunkt&#39;, og &#39;det så bare rigtigt ud - de rigtige vinkler, de rigtige komponenter til den rigtige pris.&#39;<br /> <strong>TRUNNION MOUNT -</strong> Et støddæmper til stang giver vores rammedesignere mere fleksibilitet ved at bruge et kortere stød med øget slaglængde. Kombineret med kuglelejebøsningen på det øverste beslag øges stødfølsomheden, og affjedringens ydeevne kan indstilles perfekt.<br /> <strong>CARBON ELLER ALUMINIUM -</strong> Disse modeller fås i to forskellige stelindstillinger. En carbon-forende kombineret med en 6061 aluminiums bagende eller et mere budgetvenligt chassis i aluminium.<br /> <strong>AGGRESSIVE GEOMETRY-</strong> Race-beprøvet og elsket af den internationale cykelpresse, vores ONE-SIXTY kombinerer super korte 430 mm kædelængder for øget smidighed og legende, med en lang rækkevidde, slap hovedvinkler og et lavt tyngdepunkt, der leverer en aggressiv enduro-geometri .<br /> <strong>BOOST -TEKNOLOGI -</strong> De fleste modeller tilbyder Boost -teknologi for og bag. Den lavere akselstandard på 110 mm (foran) og 148 mm (bag) giver mulighed for en bredere talevinkel, hvilket resulterer i et stivere og stærkere hjul, der er yderst fordelagtigt for disse cykler i betragtning af de påvirkninger, de udholder. BIG.TRAIL 200 har 100 mm gaffelafstand.</p>"
