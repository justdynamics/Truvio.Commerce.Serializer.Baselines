"ProductName": "GTw Legato 2.0 Lady"
"ProductShortDescription": |
  <p>Clean, smooth and wonderfully comfortable, the Legato is a ride that&rsquo;s hard to forget. It blends together the speed of a road bike with the comfort and upright positioning of a hybrid, to give you a ride that&rsquo;s fun, fast AND friendly to your body.</p>
"ProductLongDescription": |
  <ul>
  	<li>Hydroformed Kinesis aluminum frame and fork is super-lightweight and responsive on the road</li>
  	<li>Women&rsquo;s Specific Geometry is shaped with a taller head tube, steeper seat tube angle and shorter top tube length for a customized fit</li>
  	<li>Shimano 18-speed drivetrain with FSA Omega Compact cranks offer plenty of easy and efficient gearing options for the climbs</li>
  	<li>Flat handlebars with Rapid Fire shifters makes changing shifting easy and comfortable</li>
  	<li>Selle San Marco Women&rsquo;s Ischia and dual density gel grips add comfort</li>
  	<li>Vittoria Zaffiro tires provide flexible comfort and puncture resistance</li>
  	<li>Tektro Forged Mini V-brakes deliver strong, easy braking</li>
  </ul>
