"ProductName": "Bell Delirium 1 Euro MTB Helmet"
"ProductShortDescription": |
  <p>Amazingly light with extremely large vents for great airflow, this helmet is more than just head protection - it&rsquo;s a fashion statement!</p>
"ProductLongDescription": |-
  <ul>
  <li>Fusion In-Mold Microshell with Internal Reinforcement offers protection, durability and impact resistance for whatever you might encounter on the trail</li>
  <li>18 whopping vents bring cool air in through the front, allowing it to pass over your head and then flushes warm air out of the rear ports &ndash; so YOU stay cool and your HEAD stays cool</li>
  <li>Blade visor easily snaps into place to protect your eyes from the sun, rain and any other airborne items</li>
  <li>One handed, GPS Fit System keeps your helmet secure through the technical sections</li>
  <li>Cam-Lock adjustable levers ensure a customized fit</li>
  </ul>
