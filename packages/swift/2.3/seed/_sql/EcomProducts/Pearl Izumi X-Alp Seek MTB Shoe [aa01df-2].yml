"ProductName": "Pearl Izumi X-Alp Seek MTB Shoe"
"ProductShortDescription": "<p>Pearl a repris la tige légère de sa chaussure de course Seek et l'a associée à la semelle X-Alp primée, pour vous offrir des performances confortables pour toutes vos randonnées et vos activités à vélo.</p><p></p><p>Ils sont préparés avec de la cire à triple temps</p>."
"ProductLongDescription": "<ul><li>La plaque en nylon R&amp ;R offre un transfert de puissance exceptionnel à vos pédales lorsque vous êtes sur le vélo</li><li>L'avant-pied flexible et le talon biseauté offrent l'agilité dont vous avez besoin lorsque vous n'êtes pas sur le vélo</li><li>La semelle extérieure à crampons en caoutchouc carbone offre une traction supérieure et permet de se débarrasser de la boue</li><li>L'empeigne en mesh/synthétique respirant assure une ventilation rafraîchissante lorsque les choses chauffent</li><li>Le design à coupe basse pour un ajustement et une sensation légers, rapide</li><li>Le système de lacets maintient cette chaussure fermement en place</li></ul>"
