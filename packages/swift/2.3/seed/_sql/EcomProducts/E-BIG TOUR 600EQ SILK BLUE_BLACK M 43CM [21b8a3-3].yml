"ProductName": "E-BIG TOUR 600EQ SILK BLUE/BLACK M 43CM"
"ProductShortDescription": "<p><strong>MOUNTAIN BIKE TREKKING AT ITS BEST&thinsp;</strong><br>The eBIG.TOUR EQ combines the best of two worlds in the MERIDA line-up. From the outside a mountain bike but a trekking bike at heart. With a frame based on the eBIG.NINE, a suspension fork and wider 29er MTB tyres, the bike delivers a more comfortable riding feeling than a conventional trekking bike. However, as it comes fully equipped with fenders, carrier and lights, it is ideal for all tasks and duties you normally expect from a trekking bike or hybrid. The heavily bent down top tube offers incredible stand over height for easy mount and dismount.</p>"
"ProductLongDescription": |-
  <ul>
  <li>MORE POWER AND RANGE - Shimano's EP8 motor offers a perfectly balanced power delivery with up to 85 Nm and has further improved on size, weight, noise and motor drag. The new 630 Wh battery is perfectly integrated into the hydroformed down tube and delivers an impressive range for even longer detours home.<br />GO BIG - The eBIG.TOUR EQ is rolling on 29er wheels which have fantastic &lsquo;rolling over obstacles&rsquo; behaviour. As standard, it comes equipped with 2.2" wide tyres which offer plenty of grip and comfort. If no fenders are fitted, the tyres can go up to 2.35" improving the off-road riding characteristics even further.<br />WATER CARRIER - The eBIG.TOUR EQ frame offers the possibility to fit a water bottle or further accessories like a lock or pump in two different positions. One is on the top of the down tube, while a second is below the top tube. This gives the rider, besides the possibility to mount bottle cages, the option to mount for example a folding-lock or pump bracket.&nbsp;<br />SYSTEM WEIGHT - The system weight of a bike is the combined weight of bike, rider and additional luggage. The allowed system weight is 140 kg. As an e-bike is already heavier than a regular bike, and as it also makes it easier to transport larger amounts of luggage, it is imperative to certify a higher overall system weight. All MERIDA e-bikes, as well as all used componentry, go through a rigorous and e-bike specific testing schedule which mimics the higher forces and strains to guarantee the rider the highest level of safety.<br />GET THE RIGHT TRAVEL - 100 mm up front offers lots of comfort while having plenty of reserves when you choose a more &lsquo;off-road&rsquo; route home. Ultimately e-MTBs encourage the rider to go &lsquo;off the beaten track&rsquo; whenever possible.</li>
  </ul>
