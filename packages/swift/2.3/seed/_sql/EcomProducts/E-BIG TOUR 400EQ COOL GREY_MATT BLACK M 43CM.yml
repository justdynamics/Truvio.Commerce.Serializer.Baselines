"ProductName": "E-BIG TOUR 400EQ COOL GREY/MATT BLACK M 43CM"
"ProductShortDescription": "<p><strong>MOUNTAIN CIKE TREKKING P&Aring; DET BEDST</strong><br />EBIG.TOUR EQ kombinerer det bedste fra to verdener i MERIDA-serien. Udenfor en mountainbike, men en trekkingcykel i hjertet. Med en ramme baseret p&aring; eBIG.NINE, en affjedringsgaffel og bredere 29er MTB -d&aelig;k, giver cyklen en mere behagelig ridef&oslash;lelse end en konventionel trekkingcykel. Men da den er fuldt udstyret med sk&aelig;rme, holder og lys, er den ideel til alle opgaver og opgaver, du normalt forventer af en trekkingcykel eller hybrid. Det kraftigt nedb&oslash;jede &oslash;verste r&oslash;r tilbyder en utrolig stand over h&oslash;jden for let montering og demontering.</p>"
"ProductLongDescription": "<p>MERE KRAFT OG UDVALG - Shimanos EP8 -motor tilbyder en perfekt afbalanceret kraftoverf&oslash;rsel med op til 85 Nm og har yderligere forbedret st&oslash;rrelse, v&aelig;gt, st&oslash;j og motortr&aelig;k. Det nye 630 Wh batteri er perfekt integreret i det hydroformede nedr&oslash;r og leverer et imponerende omr&aring;de til endnu l&aelig;ngere omveje hjem.<br />G&Aring; STORT - eBIG.TOUR EQ ruller p&aring; 29er hjul, der har fantastisk 'rullende over forhindringer' adf&aelig;rd. Som standard er den udstyret med 2,2 \"brede d&aelig;k, der giver masser af greb og komfort. Hvis der ikke er monteret sk&aelig;rme, kan d&aelig;kkene g&aring; op til 2,35\", hvilket forbedrer terr&aelig;negenskaberne yderligere.<br />WATER CARRIER - eBIG.TOUR EQ -rammen giver mulighed for at montere en vandflaske eller yderligere tilbeh&oslash;r som en l&aring;s eller pumpe i to forskellige positioner. Den ene er p&aring; toppen af nedr&oslash;ret, mens en anden er under det &oslash;verste r&oslash;r. Dette giver rytteren, udover muligheden for at montere flaskebure, mulighed for at montere f.eks. En foldel&aring;s eller pumpebeslag.<br />SYSTEMV&AElig;GT - Systemets v&aelig;gt p&aring; en cykel er den samlede v&aelig;gt af cykel, rytter og ekstra bagage. Den tilladte systemv&aelig;gt er 140 kg. Da en e-cykel allerede er tungere end en almindelig cykel, og da det ogs&aring; g&oslash;r det lettere at transportere st&oslash;rre m&aelig;ngder bagage, er det bydende n&oslash;dvendigt at certificere en h&oslash;jere samlet systemv&aelig;gt. Alle MERIDA e-cykler, s&aring;vel som alle brugte komponenter, gennemg&aring;r en streng og e-cykelspecifik testplan, der efterligner de h&oslash;jere kr&aelig;fter og belastninger for at garantere rytteren det h&oslash;jeste sikkerhedsniveau.<br />F&Aring; DEN RETTE REJSE - 100 mm foran giver masser af komfort, mens du har masser af reserver, n&aring;r du v&aelig;lger en mere 'off -road' rute hjem. I sidste ende opfordrer e-MTB'er rytteren til at g&aring; 'off the beaten track' n&aring;r det er muligt.</p>"
