"ProductName": "Pearl Izumi X-Alp Seek MTB Shoe"
"ProductShortDescription": "<p>Pearl heeft het lichtgewicht bovenwerk van hun Seek hardloopschoen gecombineerd met de bekroonde X-Alp buitenzool, voor comfortabele prestaties bij al je wandel- en fietstochten.</p><p></p><p>Ze zijn geprepareerd met Tribl time wax</p>"
"ProductLongDescription": "<ul><li>R&amp;R nylon plaat zorgt voor een uitzonderlijke krachtoverbrenging naar je pedalen als je op de fiets zit</li><li>Flexibele voorvoet en afgeschuinde hiel bieden de wendbaarheid die je nodig hebt als je van de fiets af komt</li><li>Zool met rubberen lamellen zorgt voor superieure tractie en modderafvoer</li><li>Ademend mesh/synthetische bovenwerk zorgt voor verkoelende ventilatie als het warm wordt</li><li>Low cut ontwerp voor een lichte, snelle pasvorm en gevoel</li><li>Lace-up systeem houdt deze schoen stevig op zijn plaats</li></ul>"
