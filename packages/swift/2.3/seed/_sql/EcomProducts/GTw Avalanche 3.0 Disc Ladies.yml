"ProductName": "GTw Avalanche 3.0 Disc Ladies"
"ProductShortDescription": |
  <p>Ready to play in the dirt? This confidence building, off-road hardtail with proven technology and a women&rsquo;s specific fit delivers a ton of fun at a trickled down price!</p>
"ProductLongDescription": |
  <ul>
  	<li>GT 6061 Triple Triangle frame increases pedaling efficiency and dampens road vibration while remaining lightweight, stiff and tough</li>
  	<li>Women&rsquo;s Specific Geometry is shaped with a taller head tube, steeper seat tube angle and shorter top tube length for a customized fit</li>
  	<li>100mm of smooth front suspension absorbs bumps and adds control to your ride</li>
  	<li>Shimano Alivio 24-speed drivetrain with RapidFire shifters gives you several, easy gear options for hilly terrain</li>
  	<li>WTB Speed She saddle and anatomical grips enhance comfort without compromising performance</li>
  	<li>Tektro IO mechanical disc brakes provide low maintenance, all-weather stopping power</li>
  	<li>Durable aluminum wheels with Kenda Nevegal tires take hold of any trail with a vengeance</li>
  </ul>
