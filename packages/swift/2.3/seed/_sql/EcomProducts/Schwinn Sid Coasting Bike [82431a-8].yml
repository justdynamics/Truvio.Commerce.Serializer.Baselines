"ProductName": "Schwinn Sid Coasting Bike"
"ProductShortDescription": "<p>If you want baptism by air, here’s your ride. Not only does this bike clear big jumps with ease, its tough, chromoly frame feels nearly weightless when you’re off the ground! Add on 100mm of front suspension to cushion the drops and 3-piece cranks for that sweet barspin, and you’ve got yourself a ride that can tackle anything on the ground or in the air.</p>"
"ProductLongDescription": "<ul><li>Schwinn Classic Sport frame design with Schwinn Tourister handlebar puts you in a natural upright position for comfortable riding</li><li>Chainguard, steel fenders and kickstand work together to keep your bike looking its best</li><li>Shimano Coasting components with a 3-speed auto shifting system and coaster brake take the thinking out of gear changes and provide sure stops</li><li>Schwinn Sport Saddle offers cushy support for your buns</li><li>Smooth cruiser tires deliver an easy rolling, comfortable experience</li><li>Light and corrosion resistant alloy wheels with stainless steel spokes add durability</li><li>Rear rack holds everything you need for a day of careless fun</li></ul>"
