"ProductName": "UC Santa Barbara Gauchos"
"ProductShortDescription": "<p>&ldquo;The Fantom of the Thunderdome&rdquo; - a mascot who wears swim goggles, a black cape, a yellow team jersey and denim shorts. Now aren&rsquo;t you interested in checking out the next UCSB game? Sure you are. And you can get there on this tough and durable cruiser that boasts the school&rsquo;s Blue and Gold colors. Just don&rsquo;t forget to stop by the Gaucho Locos booster club (aka Gauchoholics) and pick up a signature Top 10 T-shirt!</p>"
"ProductLongDescription": |-
  <ul>
  <li>Hi-Ten steel frame is lightweight, strong and resilient</li>
  <li>Bullhorn handlebars with leather grips keep you riding in comfort and relaxed style</li>
  <li>Single speed drivetrain is simple and uncomplicated to maintain</li>
  <li>Dual spring saddle adds comfort to your backside</li>
  <li>Rubber Block platform pedals make this bike easy to ride</li>
  <li>Kenda Cruiser tires roll smoothly over flat or rough terrain</li>
  <li>Rear coaster brake delivers rapid braking power in any condition</li>
  <li>Fits anyone up to 6&rsquo;6</li>
  </ul>
