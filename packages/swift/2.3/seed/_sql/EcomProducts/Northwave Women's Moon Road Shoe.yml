"ProductName": "Northwave Women's Moon Road Shoe"
"ProductShortDescription": |
  <p>Remember those comfy &ldquo;moon boots&rdquo; that Mom made you wear in the wintertime? They made you feel like you were walking on marshmallows! That&rsquo;s why we couldn&rsquo;t resist the Moon shoe from Northwave. Not only do these shoes have the technical features you need to go hard, they feel so luxuriously comfortable, you&rsquo;ll never want to take them off!</p>
"ProductLongDescription": |
  <ul>
  	<li>NRG thermoplastic sole delivers lightweight stiffness while remaining flexible enough for stellar pedal performance</li>
  	<li>Airflow System with polyurethane improves ventilation and increases stability</li>
  	<li>Air Sport footbed offers the perfect amount of support and cushioning</li>
  	<li>Lift Stop heel places your foot in its most natural position for efficient power transfer</li>
  	<li>Two Velcro straps provide a secure fit</li>
