"ProductName": "Nirve Paul Frank Aku Single Speed"
"ProductShortDescription": |
  <p>Nirve&#39;s attractive&nbsp;style has caught the eye of some of today&#39;s top artists and brands. Each brand contributes its own unique personality to create some of the most fun and fashionable bicycles on the planet. Complete with basket and bell, the reptilian green Aku Cruiser from Paul Frank is ready roll to any adventure!</p>
"ProductLongDescription": |
  <ul>
  	<li>Durable, steel frame is strong, resilient and ensures a smooth ride on the boardwalk or down the street</li>
  	<li>Wide, upright handlebars with full fenders and alligator graphics give this ride a fun, retro look</li>
  	<li>Front basket carries everything you need and the &ldquo;I love my bike&rdquo; bell lets everyone know that you&rsquo;re in the neighborhood</li>
  	<li>Alligator print saddle with dual springs keeps your backside comfortable</li>
  	<li>Rear coaster brake delivers rapid braking power no matter what the weather forecast</li>
  </ul>
