"ProductName": "SCULTURA 9000-E MATT BLACK/GLOSSY BLACK L 56CM"
"ProductShortDescription": "<p><strong>LIGHTWEIGHT RACE PEDIGREE</strong><br>Our lightweight racer is at the cutting edge of design, powering Team Bahrain McLaren to World-Tour victories. Available in two different geometries and as either disc brake or rim brake option, our classic road bike combines class-leading comfort, with whippet-like acceleration and stage winning climbing pedigree. Cycling Plus magazine calls it 'a piece of legendary racing equipment'.</p>"
"ProductLongDescription": |-
  <ul>
  <li>SHIMANO DIRECT HANGER - Our CF4 frame features the Shimano direct hanger for a more solid connection between frame and rear derailleur, resulting in further improved shifting and more simplified (and therefore faster) wheel changes.</li>
  <li>TYRE CLEARANCE SCULTURA DISC - The SCULTURA DISC version can be fitted with 28 mm wide tyres, providing maximum traction and transferring the improved braking power to the road. The maximum tyre width for the rim version is 25 mm.</li>
  <li>BOLT THROUGH AXLES - The 12 mm bolt through axles for greater wheel stiffness and precise disc alignment when replacing wheels. The custom axle lever is removable and has a 4 mm Allen key included, so, for example, stem and seat post clamps can be tightened and loosened.&nbsp;</li>
  </ul>
