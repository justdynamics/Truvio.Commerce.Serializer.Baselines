"ProductName": "Mongoose Ritual Dirt-Hi Mountain Bike (T5)"
"ProductShortDescription": |
  <p>Yeah, if you head to the woods with the full knowledge that you&rsquo;re not coming back out in the same shape that you left&hellip;then quite possibly, we have your perfect ride! This chromoly-loaded bike takes to the air with incredible ease yet is built tough to absorb those inevitable hard landings. And with 100mm of front suspension, Sun Ditch Witch rims, FSA cranks and SRAM componentry, this bike will have no problem surviving anything you throw its way&hellip;but the question is, will you?</p>
"ProductLongDescription": |
  <ul>
  	<li>Heavy-duty chromoly frame provides extra strength for jumps on the trail</li>
  	<li>Marzocchi Dirt Jumper 2 fork offers 100mm of plush suspension to absorb those heavy hits</li>
  	<li>FSA Moto X cranks with PC bashguard are built tough and strong for all your freeride escapades</li>
  	<li>SRAM X.5 9-speed rear shifter and SRAM X.7 derailleur blend smooth shifting action with quick and precise performance</li>
  	<li>Funn handlebar and stem with SDG seatpost and saddle supply core-level resilience that’s nearly indestructible</li>
  	<li>Hayes Stroker Trail hydraulic disc brakes with a lightweight and compact design deliver powerful stopping performance</li>
  	<li>Kenda Small Block Eight front tire and Kenda K-Rad rear tire give you the stability, traction and aggressive construction you need for dirt jumping</li>
  	<li>Sun Ditch Witch rims with Mongoose rear disc hubs are built to withstand those tough hits</li>
  	<li>Removable rim brake mounts let you run V-brakes just in case you bust or bend your rotor</li>
  </ul>
