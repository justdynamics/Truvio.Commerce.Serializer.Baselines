"ProductName": "E-ONE FORTY 8000 SILVER/BLACK"
"ProductShortDescription": "<p>E-bike Grijs Zwart Derailleur LI-ION Onderbuis Ja LCD Nee Shimano EP8</p>"
"ProductLongDescription": "<p>MORE POWER AND RANGE - Shimano&#39;s EP8 motor offers a perfectly balanced power delivery with up to 85 Nm and has further improved on size, weight, noise and motor drag. The new 630 Wh battery is perfectly integrated into the hydroformed down tube and delivers an impressive range for even longer detours home.</p><p>GO BIG - The eBIG.TOUR EQ is rolling on 29er wheels which have fantastic ‘rolling over obstacles’ behaviour. As standard, it comes equipped with 2.2&quot; wide tyres which offer plenty of grip and comfort. If no fenders are fitted, the tyres can go up to 2.35&quot; improving the off-road riding characteristics even further.</p><p>WATER CARRIER - The eBIG.TOUR EQ frame offers the possibility to fit a water bottle or further accessories like a lock or pump in two different positions. One is on the top of the down tube, while a second is below the top tube. This gives the rider, besides the possibility to mount bottle cages, the option to mount for example a folding-lock or pump bracket. </p><p>SYSTEM WEIGHT - The system weight of a bike is the combined weight of bike, rider and additional luggage. The allowed system weight is 140 kg. As an e-bike is already heavier than a regular bike, and as it also makes it easier to transport larger amounts of luggage, it is imperative to certify a higher overall system weight. All MERIDA e-bikes, as well as all used componentry, go through a rigorous and e-bike specific testing schedule which mimics the higher forces and strains to guarantee the rider the highest level of safety.</p><p>GET THE RIGHT TRAVEL - 100 mm up front offers lots of comfort while having plenty of reserves when you choose a more ‘off-road’ route home. Ultimately e-MTBs encourage the rider to go ‘off the beaten track’ whenever possible.</p><p></p>"
