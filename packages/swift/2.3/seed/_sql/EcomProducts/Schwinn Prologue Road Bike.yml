"ProductName": "Schwinn Prologue Road Bike"
"ProductShortDescription": |
  <p>Road Bike Action, March/April 2008 - THE VERDICT - &ldquo;Sometimes a good idea is only that, but with the Prologue, a good idea created a nice bike for not just the true beginner, but for someone who wants to put a few seasons on a worthy steed and save enough money to travel to enter and travel to events. This isn&rsquo;t a low-level road bike frame with aerobars slapped on - it&rsquo;s designed, built and outfitted with a purpose.&nbsp;</p>
"ProductLongDescription": |
  <ul>
  	<li>N&rsquo;Litened Gold Label aluminum aero frame with TT geometry puts you in the perfect position for lightweight speed</li>
  	<li>Black Label Carbon Pro Aero fork absorbs road vibration and delivers a smooth ride</li>
  	<li>FSA Gossamer MegaExo cranks supply sleek, stiff pedaling power for the hills and the flats</li>
  	<li>Shimano 105/Tiagra derailleurs and bar end shifters put snappy shifting action within easy reach</li>
  	<li>Aerodynamic handlebar, stem and seatpost give you a wind-cheating advantage</li>
  	<li>Selle San Marco Ponza Trilon saddle keeps you comfortable when you&rsquo;re down in the drops</li>
  	<li>Tektro RX-40 brakes provide maximum stopping power in any condition</li>
  	<li>Jalco/Formula wheels with Schwalbe Lugano tires pave the way to a fast finish</li>
  </ul>
