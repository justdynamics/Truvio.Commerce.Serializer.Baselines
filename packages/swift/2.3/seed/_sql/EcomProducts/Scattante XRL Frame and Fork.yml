"ProductName": "Scattante XRL Frame and Fork"
"ProductShortDescription": |
  <p>If &ldquo;fast and furious&rdquo; accurately describes the way you like to ride, then this winning XC frame and fork is exactly what you need!</p>
"ProductLongDescription": |
  <ul>
  	<li>7005 butted aluminum frame construction combines lightweight strength with exceptional fatigue resistance to give you a sweet and resilient ride over rugged terrain</li>
  	<li>Uses the same race-inspired geometry found on the 2008 Scattante X-560 Road Bike (see item #30-0780) for an excellent balance of predictable handling and nimble agility</li>
  	<li>Carbon fiber fork with aluminum steerer and cantilever mounts dampen vibrations on the road or trail</li>
  	<li>Small details were not overlooked: look close and you&rsquo;ll find a replaceable dropout, an integrated headset, pro paint and clean graphics</li>
  	<li>Comes complete with a carbon/aluminum fork, integrated headset and CNC machined seatpost collar</li>
  </ul>
