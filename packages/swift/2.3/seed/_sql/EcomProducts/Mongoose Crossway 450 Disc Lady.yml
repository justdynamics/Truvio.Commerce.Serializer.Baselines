"ProductName": "Mongoose Crossway 450 Disc Lady "
"ProductShortDescription": "<p>Denne easy-rider er ideel til cykelstier, landeveje og ture ind til byen og bruger cross/comfort-geometri, skivebeslag på indersiden af stængerne og semi-aggressive dæk for at give dig enestående komfort og ydeevne, uanset hvor du kører.</p>."
"ProductLongDescription": |-
  <ul>
  <li>Mongoose-aluminiumsstel med cross/comfort-geometri giver dig en mere oprejst position, så du nemt kan træde i pedalerne</li>
  <li>63 mm luftaffjedring foran giver dig en behagelig komfort i ujævnt terræn</li>
  <li>FSA Alpha Drive TreGange med SRAM/SR Suntour-drivlinje giver masser af gearmuligheder til bakkerne og de flade områder</li>
  <li>Mongoose aluminiumsstyr, sadelpind og frempind leverer styrke, stil og ydeevne på kerne-niveau</li>
  <li>Tektro IO mekaniske skivebremser giver hurtig og kontrolleret bremsekraft under alle forhold</li>
  <li>Ritchey SpeedMax Delta-dæk holder dig solidt plantet på stien eller vejen</li>
  <li>Slidstærke Alex-fælge med Formula disc-nav bevarer styrke og stivhed, uanset hvad du møder</li>
  <li>Ergo Comfort Dual Density-greb og Mongoose Performance Hybrid-sadel giver ekstra støddæmpning</li>
  </ul>
