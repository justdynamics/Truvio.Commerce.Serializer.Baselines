"ProductName": "Nirve Lahaina Single Speed Ladies"
"ProductShortDescription": |
  <p>Nothing exemplifies the cruiser lifestyle better than a sunset ride along the waterfront with a balmy breeze blowing through your hair. The Nirve Lahaina features surf inspired graphics that are as much at home along the beaches as they are anywhere in the world. No matter where you live, you can claim your piece of paradise with this beautiful, casual cruiser.</p>
"ProductLongDescription": |
  <ul>
  	<li>Durable, steel frame is strong, resilient and ensures a smooth ride</li>
  	<li>Wide, upright handlebars with full fenders and painted island graphics give this ride a retro look</li>
  	<li>Island flower embossed saddle with dual springs keeps your backside comfortable</li>
  	<li>Rear coaster brake delivers rapid braking power in any weather</li>
  </ul>
