"ProductName": "Scattante T-560 "
"ProductShortDescription": |
  <p>Gain the competitive edge for your next triathlon, time-trail or Sunday group ride on this feature-packed bike! Aluminum frame is designed to be comfortable enough for everyday riding, yet with the simple addition of aerobars, it easily transforms into a race-driven machine that performs on the sprints and in the climbs. Carbon fiber fork and seatpost smooth out the road ahead, high-end Shimano components put precision shifting within easy reach and the compact cranks give you everything you need to power up the climbs and sail down descents with confidence.</p>
"ProductLongDescription": |
  <ul>
  	<li>6061 double butted aluminum frame with carbon aero fork blades deliver a stiff, efficient ride with less road vibration</li>
  	<li>Shimano 105 components with Dura-Ace bar-end shift levers give you high performance, reliable speed and makes shifting quicker and easier than ever</li>
  	<li>FSA Energy Compact cranks with 11/23 cassette provide the right amount of gearing for the hills and flats</li>
  	<li>Removable Scattante aerobars let you customize your bike for comfort or racing</li>
  	<li>Tektro R570 dual pivot calipers offer strong, progressive stopping power and good modulation</li>
  	<li>Kenda tires keep you moving along at high speeds while remaining exceptionally quiet against the pavement</li>
  	<li>Alex ALX 320 Comp wheelset cuts through the wind with bladed spokes, aero rims and smooth rolling hubs</li>
  </ul>
