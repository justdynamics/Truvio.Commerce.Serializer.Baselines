"ProductShortDescription": |
  <p>This &nbsp;racer will having you weaving through tight turns, climbing up unrelenting hills, traveling over jagged terrain, blasting through mucky conditions</p>
"ProductLongDescription": |
  <ul>
  	<li>7005 butted aluminum frame is lightweight, strong and rigid</li>
  	<li>Carbon bladed fork and seatpost dampens vibrations and offers a smooth, stiff ride</li>
  	<li>FSA Gossamer MegaExo compact cranks give you a sleek and powerful pedal stroke for the flats and the climbs</li>
  	<li>Shimano 105 drivetrain combines reliable speed and high performance with incredible control and response</li>
  	<li>Carbon/aluminum seatpost with aluminum stem and handlebar guarantees core-level strength, style and performance</li>
  	<li>Kenda K-932 tires provide excellent traction and stability without compromising speed</li>
  	<li>Alex ALX 270 wheelset cuts through the wind with bladed spokes, aero rims and smooth rolling hubs</li>
  	<li>Tektro 992AG linear-pull brakes deliver perfectly modulated stopping power</li>
  </ul>
