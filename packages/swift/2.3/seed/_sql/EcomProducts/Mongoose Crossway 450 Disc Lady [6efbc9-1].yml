"ProductName": "Mongoose Crossway 450 Disc Lady "
"ProductShortDescription": "<p>Ideal for bike paths, country roads and jaunts into town, this easy-rider uses cross/comfort geometry, inside-the-stays disc mounts and semi-aggressive tires to give you exceptional comfort and performance wherever you ride.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Mongoose aluminum frame with cross/comfort geometry puts you in a more upright position for easy pedaling</li>
  <li>63mm of air sprung, front suspension gives you plush comfort over uneven terrain</li>
  <li>FSA Alpha Drive triple cranks with SRAM/SR Suntour drivetrain offers tons of gear options for the hills and the flats</li>
  <li>Mongoose aluminum handlebars, seatpost and stem deliver core-level strength, style and performance</li>
  <li>Tektro IO mechanical disc brakes deliver rapid and controlled stopping power in any condition</li>
  <li>Ritchey SpeedMax Delta tires keep you firmly planted on the trail or road</li>
  <li>Durable Alex rims with Formula disc hubs maintain strength and rigidity no matter what you encounter</li>
  <li>Ergo Comfort Dual Density grips and Mongoose Performance Hybrid saddle supply extra cushioning</li>
  </ul>
