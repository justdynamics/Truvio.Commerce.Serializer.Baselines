"ProductName": "Mongoose Sabrosa Commuter Bike"
"ProductShortDescription": |
  <p>For those to ride to work everyday, this bike is the next best thing to a warm cup of coffee early in the A.M. The single speed drivetrain with disc brakes means you don&rsquo;t have to think that hard or that much about maintenance &ndash; which is always a good thing before the caffeine hits. Solid aluminum frame puts you in a comfortable riding position while the durable wheelset and tires will get you through traffic, dirt or over manhole covers with ease.</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight aluminum frame with comfort geometry makes cycling a breeze</li>
  	<li>Single speed drivetrain is simple and uncomplicated to maintain</li>
  	<li>Mechanical disc brakes provide low maintenance, all-weather stopping power</li>
  	<li>Bio-Tuned ergo bar ends offer comfortable positioning</li>
  	<li>Durable and responsive wheelset can go from pavement to trail effortlessly</li>
  	<li>Includes a stainless steel coffee thermos with cage</li>
  </ul>
