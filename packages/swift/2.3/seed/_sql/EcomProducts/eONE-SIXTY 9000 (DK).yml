"ProductShortDescription": "<p>Disse modeller f&aring;s i to forskellige stelmuligheder. En carbon frontende kombineret med en 6061 aluminium bagende eller et mere budgetvenligt chassis helt i aluminium. Disse modeller f&aring;s i to forskellige stelmuligheder. En carbon frontende kombineret med en 6061 aluminium bagende eller et mere budgetvenligt chassis helt i aluminium. Disse modeller f&aring;s i to forskellige stelmuligheder. En carbon frontende kombineret med en 6061 aluminium bagende eller et mere budgetvenligt chassis helt i aluminium.</p>"
"ProductLongDescription": |-
  <p><strong>SHIMANO'S EP8</strong>: Kommer udstyret med den nye EP8 motor fra Shimano STePS. Den giver en &oslash;get ydeevne p&aring; 85 Nm, mindre v&aelig;gt, en yderligere reduktion i st&oslash;rrelse og mindre friktion. Oven i k&oslash;bet tilbyder det nye interne batteri en udvidet r&aelig;kkevidde og superhurtige opladningsmuligheder.</p>
  <p><strong>INTERN BLOCK</strong>: F&oslash;rst introduceret i 2015, e-bike-versionen af 'Internal Block' er indbygget direkte i rammen og forhindrer gaffelkronen i at ramme rammen i tilf&aelig;lde af et styrt eller en ekstrem styrevinkel. Som en ekstra beskyttelse er der ekstra gummikofangere p&aring; stellet for at undg&aring; skader p&aring; stellet fra gaffelkronen.</p>
  <p><strong>SATELLITPUNKTER</strong>: eONE-SIXTY har en perfekt placeret satellit-t&aelig;nd/sluk-knap, ved topr&oslash;rets ende af topr&oslash;ret, og en velbeskyttet satellit-opladningsport, placeret i hovedrammetrekanten lige over motoren.</p>
  <p><strong>CLEVER HJUL</strong>: For at give de e-full suspension cykler pr&aelig;cis styring, fantastisk 'rulning over forhindringer'-adf&aelig;rd og alligevel maksimal tr&aelig;kkraft, har vi kombineret et 29er forhjul med et 2,5" d&aelig;k og et 650B baghjul, udstyret med et lidt bredere 2,6" d&aelig;k. Den perfekte kombination af pr&aelig;cision, legende og tr&aelig;kkraft.</p>
  <p><strong>THERMO GATE</strong>: Specielt placerede &aring;bninger p&aring; kulstofmodellerne n&aelig;r hovedr&oslash;ret, der fungerer som en skorsten og tillader den varme luft at sprede sig for at garantere den optimale driftstemperatur for det interne batteri. 'Thermo Gate' g&oslash;r det muligt for batteriet at yde sit bedste under alle forhold.</p>
  <p><strong>VANDB&AElig;RER</strong>: P&aring; grund af det integrerede batteri var vi i stand til at tilbyde fastg&oslash;relsespunkter til vandflaskebure, s&aring; flasker eller tilbeh&oslash;r som en l&aring;s eller pumpe til rammen kunne monteres i hovedrammetrekanten. Fantastisk, hvis du vil holde ryggen fri for hydreringspakker og rygs&aelig;kke.</p>
  <p><strong>CARBON ELLER ALUMINIUM</strong>: Disse modeller f&aring;s i to forskellige rammemuligheder. En carbon frontende kombineret med en 6061 aluminium bagende eller et mere budgetvenligt chassis helt i aluminium.</p>
