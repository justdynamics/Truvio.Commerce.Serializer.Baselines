"ProductName": "Scattante R-560 Triple "
"ProductShortDescription": |
  <p>If you want baptism by air, here’s your ride. Not only does this bike clear big jumps with ease, its tough, chromoly frame feels nearly weightless when you’re off the ground! Add on 100mm of front suspension to cushion the drops and 3-piece cranks for that sweet barspin, and you’ve got yourself a ride that can tackle anything on the ground or in the air.</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight aluminum frame with carbon fork offers a stiff and efficient ride with less vibration</li>
  	<li>Shimano 105 Triple drivetrain gives you high performance, reliable speed and conquers every hill in your path</li>
  	<li>FSA Gossamer MegaExo cranks deliver sleek, stiff pedaling power for the hills and the flats</li>
  	<li>Aluminum handlebar, seatpost and stem supply core-level strength, style and performance</li>
  	<li>Kenda tires keep you moving along at high speeds while remaining exceptionally quiet against the pavement</li>
  	<li>Alex ALX 270 wheelset cuts through the wind with bladed spokes, aero rims and smooth rolling hubs</li>
  	<li>Tektro R530 dual pivot calipers deliver strong, progressive stopping power and good modulation</li>
  </ul>
