"ProductShortDescription": "<p>Se vuoi il battesimo in aereo, ecco la soluzione che fa per te. Questa bici non solo supera facilmente i grandi salti, ma il suo robusto telaio cromato sembra quasi privo di peso quando sei sollevato da terra! Aggiungi 100 mm di sospensione anteriore per attutire le cadute e pedivelle in 3 pezzi per quel dolce effetto sul manubrio, e avrai una pedalata in grado di affrontare qualsiasi cosa, a terra o in aria.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Il design del telaio Schwinn Classic Sport con manubrio Schwinn Tourister ti mette in una posizione eretta naturale per una guida confortevole</li>
  <li>Copricatena, parafanghi in acciaio e cavalletto lavorano insieme per mantenere la tua bici al meglio</li>
  <li>I componenti Shimano Coasting con sistema di cambio automatico a 3 velocità e freno a contropedale eliminano il pensiero dai cambi di marcia e forniscono arresti sicuri</li>
  <li>Schwinn Sport Saddle offre un comodo supporto per i tuoi glutei</li>
  <li>I pneumatici cruiser lisci offrono un'esperienza facile e confortevole</li>
  <li>I cerchi in lega leggeri e resistenti alla corrosione con raggi in acciaio inossidabile aggiungono durata</li>
  <li>Il portapacchi posteriore contiene tutto il necessario per una giornata di divertimento spensierato</li>
  </ul>
