"ProductShortDescription": |
  <p>Built to withstand aggressive accelerating, braking and cornering, the R320 has the stiffness and lightweight durability you need for the rigors of high-performance competition!</p>
"ProductLongDescription": |
  <ul>
  	<li>Proprietary tube shaping process gives this oversized, triple-butted, brushed finish titanium frame incredible stiffness and power transfer</li>
  	<li>Massive Force Specific shaped downtube enhances bottom bracket rigidity</li>
  	<li>Cold-worked toptube guarantees a stable front end that doesn&rsquo;t wobble at high speeds</li>
  	<li>Asymmetric and diamond shaped seatstays enhance climbing and sprinting</li>
  	<li>Competition tuned geometry provides a comfortable fit, excellent stability and precise handling</li>
  	<li>Semi-compact design for improved standover height</li>
  	<li>Alpha Q GS-10 Competition Grand Tour Series front fork with proprietary CRT and Nano Technology produces a smooth ride with an uncompromising stiffness to weight ratio</li>
  	<li>Perfect for aggressive club rides, stage racing, open road racing, criteriums, Grand and Pro Tour road events</li>
  </ul>
