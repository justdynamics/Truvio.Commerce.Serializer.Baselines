"ProductName": "SILEX 700 MATT BLACK/GLOSSY ANTHRACITE XL 56CM"
"ProductShortDescription": "<span style=\"color: rgb(21, 21, 21); font-family: &quot;Uni Sans&quot;, &quot;Helvetica Neue&quot;, Arial, sans-serif; font-size: 15px;\">Hurtigt rullende, men enormt offroad-kompatible 700c-hjul, triple butted aluminiumsramme, fuld carbon gaffel og Shimano&#39;s grusspecifikke GRX-gruppesæt er blot nogle af højdepunkterne på vores topgraden aluminiumgruscykel. SILEX 700 er klar til din næste overnatter, elsker at se om den kan følge med din lokale kædebande og hjælper med at gøre din daglige rejse til arbejde til en fornøjelig fitnessrejse. 700 er en rigtig jack of all trades.</span>"
"ProductLongDescription": "<div>Der er en vis skønhed ved bare at ride uden at se tiden, på vej overalt hvor du føler trang. For disse forlystelser giver testen og prisvindende SILEX fuldstændig mening</div><div> Vores mest behagelige og alsidige landevejscykel nogensinde. Med sin moderne MTB-inspirerede geometri, lange top- og hovedrør og korte stilk giver den en smidig, tillidsvækkende håndtering. Selvom SILEX ofte ses på udvidede grus- og hårde vejudflugter samt cykelpakningsture, fandt SILEX også en stærk tilslutning i komfortorienterede landevejskendere samt pendlere og bytrafikvævere. Det mere robuste 650b -hjulede alternativ til 700c SILEX har formået at opnå flere testgevinster samt komfortpræmier og kommer tilbage i form af det fuldt lastede og trådløst skiftede SILEX+ LIMITED. Den &#39;klassiske&#39; 700c SILEX imponerede også pressen med 400&#39;erne, der sikrede en testsejr i Cycling Plus, der blev certificeret som en &#39;enorm sjov faktor&#39;, &#39;suveræn kørestilling&#39; og &#39;strålende off-road håndtering&#39;.</div><ul><li> Tredobbelt aluminiumsramme og gaffel i fuld kulstof</li><li> 700c hjul for velafbalanceret off og on-road kapacitet</li><li> Intern kabelføring for en ren og let at indlæse ramme</li><li> Komfortgeometri til lange timer i sadlen</li><li> MTB-inspireret håndtering for overlegen terrænegenskaber</li><li> Tre flaskeholderpositioner og chefer for yderligere bagagekapacitet på gaffelbenene</li></ul>"
