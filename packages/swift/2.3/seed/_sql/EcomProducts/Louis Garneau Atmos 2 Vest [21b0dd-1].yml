  	<li>Full length, 2-way zipper with inner flap blocks chilly winds</li>
  	<li>Adjustable drawstring hem provides a comfortable fit</li>
  	<li>Reflective accents throughout add visibility</li>
  	<li>Two back pockets handle the rest of your gear</li>
