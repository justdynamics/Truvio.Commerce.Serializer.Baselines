"ProductName": "Mongoose Sabrosa Ocho Commuter"
"ProductShortDescription": |
  <p>For those “no work, all play” days, the Ocho arrives at your door ready for a few hours of frolic and fun before going on your way! Lightweight comfort geometry features the stylish Shimano Alfine drivetrain and an internal 8-speed hub to keep you looking and cycling in such relaxed style, that people will start wondering what your magic potion is. And when they ask, just pull out your coffee thermos, lean back on the saddle, look at your ride, give them a great big smile and then tell them…</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight aluminum frame with comfort geometry makes cycling a breeze</li>
  	<li>Sporty, Shimano Alfine drivetrain gives you extra comfort, control and sporty style while riding</li>
  	<li>Internal 8-speed hub combines clean looks with a wide range of gear options</li>
  	<li>Hollowtech II 2-piece cranks put pedaling power, acceleration and speed right at your feet</li>
  	<li>Aluminum flatbar with Bio-Tuned ergo bar ends and dual density saddle offer comfortable, more upright positioning</li>
  	<li>Continental City Contact tires provide excellent protection without compromising speed or weight</li>
  	<li>Hydraulic disc brakes deliver rapid and controlled stopping power in any condition</li>
  	<li>Alex rims with Shimano Center-Lock hubs offer the durable stability you need for longer rides</li>
  	<li>Stainless steel coffee thermos with cage makes your morning commute a little more tasty</li>
  </ul>
