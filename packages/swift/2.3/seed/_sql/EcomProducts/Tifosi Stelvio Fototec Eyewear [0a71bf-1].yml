"ProductName": "Tifosi Stelvio Fototec Eyewear"
"ProductShortDescription": |
  <p>If you&rsquo;re climbing the magnificent Passo Dello Stelvio in the Eastern Alps or attempting that challenging accent just around the corner, then these lightweight specs are just what you need to stay clear and focused.</p>
"ProductLongDescription": |
  <ul>
  	<li>Durable Grilamid TR-90 frame with a polycarbonate, decentered lens eliminates prismatic distortion and increases optical clarity</li>
  	<li>Fototec technology adjusts the tint level to match your surroundings</li>
  	<li>Glare Guard reflective coating reduces eye fatigue</li>
  	<li>Side vents ramp up air circulation to eliminate fogging</li>
  	<li>Hydrophilic rubber temples and adjustable nose piece provide a no-slip grip</li>
  	<li>100% UVA/UVB protection</li>
  	<li>Fits medium to large faces</li>
  	<li>Accommodates prescription adapter</li>
  	<li>Case with microfiber cleaning bag included</li>
  	<li>Gunmetal frame comes with a High Speed Red Fototec lens (35-12% light transmission)</li>
  </ul>
