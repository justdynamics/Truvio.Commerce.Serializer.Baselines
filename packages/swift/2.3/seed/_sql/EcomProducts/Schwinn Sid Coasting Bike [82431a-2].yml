"ProductName": "Schwinn Sid Coasting Bike"
"ProductShortDescription": "<p>Si vous voulez un baptême de l'air, voici votre vélo. Non seulement ce vélo franchit les gros sauts avec facilité, mais son cadre chromoly robuste semble presque en apesanteur lorsque vous décollez du sol ! Ajoutez à cela une suspension avant de 100 mm pour amortir les chutes et des manivelles en 3 parties pour un bon barpin, et vous obtenez un vélo capable de s'attaquer à tout ce qui se trouve sur le sol ou dans les airs."
"ProductLongDescription": "<ul><li>Le design du cadre Classic Sport de Schwinn avec le guidon Tourister de Schwinn vous place dans une position droite naturelle pour une conduite confortable</li><li>Le garde-chiourme, les garde-boue en acier et la béquille travaillent ensemble pour garder votre vélo à son meilleur</li><li>Les composants Coasting de Shimano avec un système de changement de vitesse automatique à 3 vitesses et un frein à rétropédalage éliminent la réflexion sur les changements de vitesse et assurent des arrêts sûrs</li><li>La selle Sport de Schwinn offre un soutien moelleux pour vos fesses</li><li>Les pneus Cruiser lisses offrent une expérience facile à rouler et confortable</li>Les roues en alliage léger résistant à la corrosion avec des rayons en acier ajoutent de la durabilité</li>Le porte-bagages arrière contient tout ce dont vous avez besoin pour une journée de plaisir insouciant</li>, de roulement et de confort</li><li>Les roues en alliage léger et résistant à la corrosion avec des rayons en acier inoxydable ajoutent à la durabilité</li><li>Le porte-bagages arrière contient tout ce dont vous avez besoin pour une journée de plaisir insouciant</li></ul>"
