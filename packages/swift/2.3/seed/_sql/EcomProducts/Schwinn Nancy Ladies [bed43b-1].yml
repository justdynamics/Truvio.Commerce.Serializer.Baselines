"ProductName": "Schwinn Nancy Ladies "
"ProductShortDescription": |
  <p>Classic style meets good old fashioned fun in this easy-going cruiser. Just swing your leg over the Schwinn&rsquo;s Classic Sport frame, seat yourself on the comfy sofa saddle, rest your hands naturally on the swept back handlebars and let the automatic shifting take care of the rest. Go ahead&hellip;relax&hellip;unwind&hellip;and roll on down the road to freedom.</p>
"ProductLongDescription": |
  <ul>
  	<li>Schwinn Classic Sport frame design with Schwinn Tourister handlebar puts you in a natural upright position for comfortable riding</li>
  	<li>Chainguard, steel fenders and kickstand work together to keep your bike looking its best</li>
  	<li>Shimano Coasting components with a 3-speed auto shifting system and coaster brake take the thinking out of gear changes and provide sure stops</li>
  	<li>Schwinn Sport Saddle offers cushy support for your buns</li>
  	<li>Smooth cruiser tires deliver an easy rolling, comfortable experience</li>
  	<li>Light and corrosion resistant alloy wheels with stainless steel spokes add durability</li>
  	<li>Rear rack holds everything you need for a day of careless fun</li>
  </ul>
