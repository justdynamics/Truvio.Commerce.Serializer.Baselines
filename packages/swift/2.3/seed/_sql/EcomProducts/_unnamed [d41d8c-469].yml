"ProductShortDescription": "<p><strong>LETVÆGTSLØBSTAMMENSÆTNING</strong><br>Vores letvægtsracer er på forkant med design og driver Team Bahrain McLaren til World-Tour-sejre. Tilgængelig i to forskellige geometrier og som enten skivebremse eller fælgbremse-mulighed, kombinerer vores klassiske landevejscykel klasseførende komfort med whippet-lignende acceleration og etapevindende klatrestamtavle. Cycling Plus-magasinet kalder det 'et stykke legendarisk racerudstyr'.</p>"
"ProductLongDescription": |-
  <ul>
  <li>SHIMANO DIRECT HANGER - Vores CF4 stel har Shimano direkte ophæng for en mere solid forbindelse mellem ramme og bagskifter, hvilket resulterer i yderligere forbedret gearskifte og mere forenklede (og derfor hurtigere) hjulskift.</li>
  <li>DÆK CLEARANCE SCULTURA DISC - SCULTURA DISC-versionen kan monteres med 28 mm brede dæk, hvilket giver maksimal trækkraft og overfører den forbedrede bremsekraft til vejen. Den maksimale dækbredde for fælgversionen er 25 mm.</li>
  <li>BOLT GENNEM AKSLER - De 12 mm boltede aksler for større hjulstivhed og præcis skivejustering ved udskiftning af hjul. Det tilpassede akselgreb er aftageligt og har en 4 mm unbraconøgle inkluderet, så f.eks. frempind og sadelpindsklemmer kan spændes og løsnes.&nbsp;</li>
  </ul>
