"ProductShortDescription": "<p>A lighter, more responsive bike for aspiring road riders!</p>"
"ProductLongDescription": |-
  <ul>
  <li>Lighter, more compliant ride thanks to a butted frame with Reflex Road tubing</li>
  <li>Carbon fiber seatstays and bladed fork smooth out the road ahead</li>
  <li>K2 Bike Fit System stem supplies personalized bar height without the extra weight</li>
  <li>Shimano Tiagra 18-speed drivetrain with compact cranks and S.T.I. shifters offer plenty of quick, easy and efficient gearing options for the climbs</li>
  <li>Shimano Tiagra dual-pivot brakes will have you stopping on a dime</li>
  <li>Wellgo clipless pedals give you more power in every rotation</li>
  <li>Continental Ultra Race tires provide comfort and exceptional handling, especially on rough or wet road surfaces</li>
  <li>A-Class ALX 200 wheelset for a super-lightweight ride that doesn&rsquo;t compromise on strength</li>
  </ul>
