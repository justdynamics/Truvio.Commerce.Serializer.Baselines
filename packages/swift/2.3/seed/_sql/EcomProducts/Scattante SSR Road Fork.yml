"ProductName": "Scattante SSR Road Fork"
"ProductShortDescription": |
  <p>For those who still believe steel is still real, we have a fork for you!</p>
"ProductLongDescription": |
  <ul>
  	<li>Designed to work perfectly with the Scattante SSR Frame, see item #30-0600</li>
  	<li>Constructed with chromoly steel to give you smooth and predictable handling experience</li>
  	<li>Chrome-plated finish and sculpted crown and fork ends give it a classic, retro-style</li>
  	<li>Straight blade legs add strength and aerodynamics</li>
  	<li>Crown is drilled to accept a normal, short-reach road brake caliper</li>
  	<li>Fits most road or track bike frames with 1 1/8&quot; head tubes</li>
  	<li>Axle-To-Crown: 367mm; Rake: 40mm</li>
  </ul>
