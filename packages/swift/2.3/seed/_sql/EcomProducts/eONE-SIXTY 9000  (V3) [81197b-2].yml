"ProductShortDescription": "<p>These models are available in two different frame options. A carbon front end combined with a 6061 aluminium rear end, or a more budget-friendly all-aluminium chassis. These models are available in two different frame options. A carbon front end combined with a 6061 aluminium rear end, or a more budget-friendly all-aluminium chassis. These models are available in two different frame options. A carbon front end combined with a 6061 aluminium rear end, or a more budget-friendly all-aluminium chassis.&nbsp;</p>"
"ProductLongDescription": |-
  <p><strong><span class="highlight-name">SHIMANO'S EP8: </span></strong>Comes equipped with the new EP8 motor from Shimano STePS. It offers an increased performance of 85 Nm, less weight, a further reduction in size and less friction. On top of that, the new internal battery offers an extended range and super-fast charging capabilities.</p>
  <p><strong><span class="highlight-name">INTERNAL BLOCK: </span></strong><span class="highlight-name">First introduced in 2015, the e-bike version of the 'Internal Block' is incorporated directly into the frame and prevents the fork crown from hitting the frame in case of a crash or an extreme steering angle. As an extra protection, there are additional rubber bumpers on the frame to avoid any frame damage from the fork crown.</span></p>
  <p><strong>SATELLITE POINTS:</strong> The eONE-SIXTY features a perfectly positioned satellite on/off switch, at the head tube end of the top tube, and a well-protected satellite charging port, positioned in the main frame triangle, just above the motor.</p>
  <p><strong>CLEVER WHEELS:</strong> To give the e-full suspension bikes precise steering, fantastic ‘rolling over obstacles’ behaviour yet maximum traction, we have combined a 29er front wheel with a 2.5" tyre and a 650B rear wheel, equipped with a slightly wider 2.6" tyre. The perfect combination of precision, playfulness and traction.</p>
  <p><strong>THERMO GATE:</strong> Specifically located openings on the carbon models near the head tube which work like a chimney and allow the warm air to dissipate to guarantee the optimum operating temperature of the internal battery. The 'Thermo Gate' enables the battery to perform at its best, in any condition.</p>
  <p><strong>WATER CARRIER:</strong> Due to the integrated battery, we were able to offer water bottle cage fixing points, allowing bottles or accessories like a lock or pump to the frame to be fitted into the main frame triangle. Great if you want to keep your back free of hydration packs and backpacks.</p>
  <p><strong>CARBON OR ALUMINIUM:</strong> These models are available in two different frame options. A carbon front end combined with a 6061 aluminium rear end, or a more budget-friendly all-aluminium chassis.</p>
