"ProductName": "Ritchey Break-Away Steel Road Frame"
"ProductShortDescription": |
  <p>You&rsquo;ll no longer have to kiss your ride goodbye each time you&rsquo;re heading out of town! This unique road frame quickly comes apart, easily packs into its own travel case and can be checked as regular baggage when you fly.</p>
"ProductLongDescription": |
  <ul>
  	<li>Locking compression coupling system separates the full size, steel frame into two parts - adding only 100g to a complete frame</li>
  	<li>Insert the two frame pieces into the travel case (29 x 26 x 9&rdquo;), put the rest of your components inside, zip it shut and then use the grab handles or wheels to transport it to your destination</li>
  	<li>Custom heat treated, Ritchey chromoly steel tubing gives you a smooth, predictable ride</li>
  	<li>Lightweight Ritchey Pro carbon fork and headset absorb vibrations from the road</li>
  	<li>Includes travel case</li>
  </ul>
