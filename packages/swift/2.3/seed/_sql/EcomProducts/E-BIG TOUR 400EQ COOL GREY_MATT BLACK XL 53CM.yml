"ProductName": "E-BIG TOUR 400EQ COOL GREY/MATT BLACK XL 53CM"
"ProductShortDescription": "<p><strong>MOUNTAIN CIKE TREKKING P&Aring; DET BEDST</strong><br />EBIG.TOUR EQ kombinerer det bedste fra to verdener i MERIDA-serien. Udenfor en mountainbike, men en trekkingcykel i hjertet. Med en ramme baseret p&aring; eBIG.NINE, en affjedringsgaffel og bredere 29er MTB -d&aelig;k, giver cyklen en mere behagelig ridef&oslash;lelse end en konventionel trekkingcykel. Men da den er fuldt udstyret med sk&aelig;rme, holder og lys, er den ideel til alle opgaver og opgaver, du normalt forventer af en trekkingcykel eller hybrid. Det kraftigt nedb&oslash;jede &oslash;verste r&oslash;r tilbyder en utrolig stand over h&oslash;jden for let montering og demontering.</p>"
"ProductLongDescription": "<p>MERE KRAFT OG UDVALG - Shimanos EP8 -motor tilbyder en perfekt afbalanceret kraftoverførsel med op til 85 Nm og har yderligere forbedret størrelse, vægt, støj og motortræk. Det nye 630 Wh batteri er perfekt integreret i det hydroformede nedrør og leverer et imponerende område til endnu længere omveje hjem.<br /> GÅ STORT - eBIG.TOUR EQ ruller på 29er hjul, der har fantastisk &#39;rullende over forhindringer&#39; adfærd. Som standard er den udstyret med 2,2 &quot;brede dæk, der giver masser af greb og komfort. Hvis der ikke er monteret skærme, kan dækkene gå op til 2,35&quot;, hvilket forbedrer terrænegenskaberne yderligere.<br /> WATER CARRIER - eBIG.TOUR EQ -rammen giver mulighed for at montere en vandflaske eller yderligere tilbehør som en lås eller pumpe i to forskellige positioner. Den ene er på toppen af nedrøret, mens en anden er under det øverste rør. Dette giver rytteren, udover muligheden for at montere flaskebure, mulighed for at montere f.eks. En foldelås eller pumpebeslag.<br /> SYSTEMVÆGT - Systemets vægt på en cykel er den samlede vægt af cykel, rytter og ekstra bagage. Den tilladte systemvægt er 140 kg. Da en e-cykel allerede er tungere end en almindelig cykel, og da det også gør det lettere at transportere større mængder bagage, er det bydende nødvendigt at certificere en højere samlet systemvægt. Alle MERIDA e-cykler, såvel som alle brugte komponenter, gennemgår en streng og e-cykelspecifik testplan, der efterligner de højere kræfter og belastninger for at garantere rytteren det højeste sikkerhedsniveau.<br /> FÅ DEN RETTE REJSE - 100 mm foran giver masser af komfort, mens du har masser af reserver, når du vælger en mere &#39;off -road&#39; rute hjem. I sidste ende opfordrer e-MTB&#39;er rytteren til at gå &#39;off the beaten track&#39; når det er muligt.</p>"
