"ProductShortDescription": |
  <p>This winning &nbsp;racer will having you weaving through tight turns, climbing up unrelenting hills, traveling over jagged terrain, blasting through mucky conditions and conquering anything else that gets in its way!</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight carbon monocoque frame with carbon/aluminum fork offers a stiff and efficient ride with less vibration</li>
  	<li>Shimano Ultegra drivetrain blends race-proven technology with ergonomic perfection to give you a new level of shifting performance</li>
  	<li>FSA SLK Light Carbon cranks with MegaExo bottom bracket deliver super-stiff, no-flex pedaling power for the road ahead</li>
  	<li>Fort&eacute; Precision handlebar and stem with carbon seatpost supply core-level strength, style and vibration damping performance</li>
  	<li>Continental Ultra Sport tires provide comfort and exceptional handling, especially on rough road surfaces</li>
  	<li>Mavic Ksyrium Equipe wheels are lightweight, responsive and guarantee a reliable road experience</li>
  	<li>Tektro R740 dual pivot calipers deliver strong, progressive stopping power and good modulation</li>
  </ul>
