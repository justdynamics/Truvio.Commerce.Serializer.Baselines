  	<li>ShiftTech Photochromatic lenses automatically respond to light conditions by adjusting the tint level to match your surroundings</li>
  	<li>TPE shrouds on stem tips and nose pads ensure a no-slip grip</li>
  	<li>Microfiber pouch keeps your glasses clean and protected</li>
  	<li>100% UVA/UVB protection</li>
  	<li>Black, Silver and White frames each come with two interchangeable lenses in Orange and Grey</li>
