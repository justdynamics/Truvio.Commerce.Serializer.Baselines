"ProductName": "K2 Astral 4.0 Road Bike"
"ProductShortDescription": |
  <p>Take the smooth, fast-rolling ability of a road bike and combine it with an upright position that reduces strain on the body and allows you to take in more the beautiful scenery while you ride.</p>
"ProductLongDescription": |
  <ul>
  	<li>Lighter, more compliant ride due to butted Reflex Road tubing, curved seatstays and fork with taper-gauge blades</li>
  	<li>Higher-range, 24-speed drivetrain with TruVativ cranks allow you to keep up on faster group rides</li>
  	<li>Shimano RapidFire Plus shifters provide crisper shifting and a more secure grip</li>
  	<li>K2 Fitness Road saddle with gel padding, triple density grips and upright handlebars keep you comfortable all ride long</li>
  	<li>Tektro RX-1 linear-pull brakes combine maximum stopping power with minimal effort</li>
  	<li>Kenda Kwick Roller Sport tires with semi-smooth center tread pattern for plush, fast-rolling performance</li>
  	<li>Rear rack mounts let you add a rack when you need to transport extra gear</li>
  </ul>
