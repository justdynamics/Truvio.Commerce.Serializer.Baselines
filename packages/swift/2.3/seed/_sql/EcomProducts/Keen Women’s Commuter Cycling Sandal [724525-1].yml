"ProductName": "Keen Women’s Commuter Cycling Sandal"
"ProductShortDescription": |
  <p>Summer cycling is all about freedom and spontaneity. That&rsquo;s why Keen designed an SPD sandal that&rsquo;ll take you from bike to hike in cool, comfortable style. Trust us&hellip;your feet will thank you!</p>
"ProductLongDescription": |
  <ul>
  	<li>Full length SPD compatible plate with optional TPU cleat cap lets you hop on and off the bike with confidence</li>
  	<li>Polypropylene webbed upper with a hydrophobic foam rubber lining provides a durable, comfortable fit and dries quickly if you encounter water</li>
  	<li>AEGIS Microbe Shield liner resists odors</li>
  	<li>Non-marking, rubber outsole delivers an efficient pedal stroke and great traction</li>
  	<li>Removable E.V.A. footbed offers support</li>
  	<li>Patented toe guards protect your feet</li>
  	<li>3M reflective pull-loops provide easy-on, easy-off convenience</li>
  	<li>Laced drawcord closure with quicklocks for a secure fit</li>
  </ul>
