"ProductName": "Race Face Deus XC Glove"
"ProductShortDescription": |
  <p>From epic trail rides to XC races, this lightweight glove will keep you comfortable and in control!</p>
"ProductLongDescription": |
  <ul>
  	<li>2mm open cell foam in the palm absorbs shock in key areas</li>
  	<li>Ultra-lightweight stretch mesh upper and “Sweat Port” finger ventilation on the palm side enhance breathability</li>
  	<li>Strategic seam placement limits rubbing, optimizes mobility and increases comfort</li>
  	<li>Silicone trigger fingers improve grip in any condition</li>
  	<li>Reinforced thumb crotch and palm heel add durability</li>
  	<li>Thumb expansion gusset gives you a greater range of motion</li>
  	<li>Terry cloth thumb absorbs sweat</li>
  	<li>Rubberized Velcro wrist closure for a personalized fit and easy adjustability</li>
  </ul>
