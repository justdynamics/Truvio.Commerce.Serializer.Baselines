"ProductName": "Nirve Classic Single Speed Bike"
"ProductShortDescription": |
  <p>From the local car show at the corner donut shop to the big time car meet in Carlisle, PA; the Classic and Kustom car culture is pure Americana. Drawing its influence from this popular lifestyle that fascinates enthusiasts worldwide, the Nirve Classic rolls into town with a vintage look and subtle appeal that&rsquo;ll take you right back to the good ole&rsquo; days.</p>
"ProductLongDescription": |
  <ul>
  	<li>Durable, steel frame is strong, resilient and ensures a smooth ride through town</li>
  	<li>Wide, upright handlebars with shorty fenders and painted graphics give this ride a retro look</li>
  	<li>Roll pleat embossed seat with dual springs keeps your backside comfortable</li>
  	<li>Rear coaster brake delivers rapid braking power no matter what the forecast</li>
  </ul>
