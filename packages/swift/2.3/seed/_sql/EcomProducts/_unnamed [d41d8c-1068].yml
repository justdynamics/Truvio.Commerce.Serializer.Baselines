"ProductShortDescription": "<p>Ideal für Radwege, Landstraßen und Ausflüge in die Stadt, diese einfache Fahrer verwendet Kreuz / Komfort-Geometrie, innen-der-Stiele Scheibenhalterungen und semi-aggressive Reifen, um Ihnen außergewöhnlichen Komfort und Leistung, wo immer Sie fahren.</p>"
"ProductLongDescription": |-
  <ul>
  <li>Mongoose Aluminiumrahmen mit Cross/Comfort Geometrie bringt dich in eine aufrechtere Position für einfaches Pedalieren</li>
  <li>63 mm luftgefederte Vorderradaufhängung für weichen Komfort auf unebenem Gelände</li>
  <li>FSA Alpha Drive DreiMal-Kurbeln mit SRAM/SR Suntour-Antrieb bieten eine Vielzahl von Schaltoptionen für die Berge und die Ebene</li>
  <li>Mongoose Aluminium-Lenker, -Sattelstütze und -Vorbau bieten Stabilität, Stil und Leistung auf höchstem Niveau</li>
  <li>Tektro IO mechanische Scheibenbremsen liefern schnelle und kontrollierte Bremskraft unter allen Bedingungen</li>
  <li>Ritchey SpeedMax Delta Reifen sorgen für festen Stand auf dem Trail oder der Straße</li>
  <li>Dauerhafte Alex-Felgen mit Formula-Scheibennaben sorgen für Festigkeit und Steifigkeit, egal, was Sie erleben</li>
  <li>Ergo Comfort Dual Density Griffe und Mongoose Performance Hybrid Sattel bieten zusätzliche Dämpfung</li>
  </ul>
