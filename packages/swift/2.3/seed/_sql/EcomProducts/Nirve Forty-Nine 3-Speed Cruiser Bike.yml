"ProductName": "Nirve Forty-Nine 3-Speed Cruiser Bike"
"ProductShortDescription": |
  <p>Those crazy forty-niners back in the mid-1800&rsquo;s defined &ldquo;California Cruisin&rdquo; as hoppin&rsquo; into their covered wagon and rollin&rsquo; on down to the river with a pan and their last stroke of luck. Well, today it&rsquo;s a bit easier to strike some gold. All you need to do is hop onto this easy ride and pedal yourself down the road toward your local jeweler&hellip;just don&rsquo;t forget your wallet!</p>
"ProductLongDescription": |
  <ul>
  	<li>Durable, steel frame is strong, resilient and ensures a smooth ride through town</li>
  	<li>Wide, upright handlebars with full fenders and woody station wagon graphics give this ride a retro look</li>
  	<li>3-speed shifting makes changing gears easy</li>
  	<li>Classic embossed seat with dual springs keeps your backside comfortable</li>
  	<li>Hand operated, rear roller brake delivers rapid braking power no matter what the forecast</li>
  </ul>
