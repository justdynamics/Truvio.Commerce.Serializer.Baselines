"ProductName": "GT GTR Series Three Road Bike"
"ProductShortDescription": |
  <p>Race along the flats and smash any hill in your path with this super-fast bike! Shimano Tiagra compact cranks and 12/25T 9-speed cassette give you plenty of low gears for chewing up mountains without compromising speed when the road levels out.</p>
"ProductLongDescription": |
  <ul>
  	<li>Hydroformed Kinesis aluminum frame is super-lightweight and responsive on the road</li>
  	<li>Kinesis carbon fork absorbs vibrations for a smooth, buttery ride</li>
  	<li>Shimano Tiagra/Sora 18-speed drivetrain with compact cranks and S.T.I. shifters offer plenty of quick, easy and efficient gearing options for the climbs</li>
  	<li>GT Road saddle adds cushioning to your backside</li>
  	<li>Tektro forged dual pivot brakes deliver maximum stopping power with minimal effort</li>
  	<li>Vittoria Zaffiro tires provide flexible comfort and puncture resistance</li>
  	<li>Semi-aero Alex D22 rims coupled with Formula/Shimano hubs give you added control and cornering confidence when the pace picks up</li>
  </ul>
