"ProductName": "K2 Mach 2.0 Road Bike 2008"
"ProductShortDescription": |
  <p>Designed for the recreational rider who wants maximum comfort for the long road ahead, the Mach 2.0 is a complete joy to ride!</p>
"ProductLongDescription": |
  <ul>
  	<li>Aluminum Recreational Road frame with Reflex tubing provides a stiff and lightweight ride</li>
  	<li>Carbon bladed fork smoothes out the road ahead</li>
  	<li>K2 Bike Fit System stem supplies personalized bar height without the extra weight</li>
  	<li>Shimano 27-speed drivetrain offers an efficient gear ratio for every situation</li>
  	<li>Gear indicators in the Shimano Sora S.T.I. shifters eliminate shifting confusion</li>
  	<li>Selle Royal Dardo saddle with padding and K2 foam/gel grips increase comfort and control</li>
  	<li>Shimano dual-pivot calipers deliver excellent stopping power</li>
  	<li>Vittoria Zaffiro tires for flexible comfort and puncture resistance</li>
  	<li>Rear rack mounts let you add a rack when you need to transport extra gear</li>
  </ul>
