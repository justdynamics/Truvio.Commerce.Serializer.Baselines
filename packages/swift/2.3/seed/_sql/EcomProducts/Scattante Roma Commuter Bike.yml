"ProductName": "Scattante Roma Commuter Bike"
"ProductShortDescription": |
  <p>Do you like the fast rolling, efficient nature of a good road bike but prefer the flatbar fit and comfort of a mountain bike? Thanks to the Roma, now you can have the best of both worlds!</p>
"ProductLongDescription": |
  <ul>
  	<li>7005 butted aluminum frame gives you a lightweight and stiff ride with high-performance characteristics</li>
  	<li>Shimano/SRAM drivetrain provides smooth and precise shifting action</li>
  	<li>TruVativ IF Road triple cranks deliver a powerful pedal stroke through hilly sections</li>
  	<li>Fort&eacute; Flatbar handlebar and saddle keep you comfortably upright and eliminate extra weight on your hands, shoulders and back</li>
  	<li>Tektro RX-1 linear-pull brakes combine maximum stopping power with minimal effort</li>
  	<li>Kenda Kwest tires roll fast and smooth while the tread design offers excellent traction in wet or dry conditions</li>
  	<li>Seatpost mounted rear rack holds all your extra gear</li>
  	<li>Handlebar bell lets everyone know you&rsquo;re comin&rsquo; around the bend</li>
  </ul>
