"ProductName": "Pearl Izumi X-Alp Seek MTB Shoe"
"ProductShortDescription": "<p>Pearl hat das leichte Obermaterial des Seek-Laufschuhs mit der preisgekrönten X-Alp-Außensohle kombiniert, um dir eine komfortable Performance bei all deinen Wander- und Bike-Aktivitäten zu bieten.</p><p></p><p>Sie sind mit DreiMal-Wachs präpariert</p>"
"ProductLongDescription": "<ul><li>R&amp;R-Nylonplatte sorgt für eine außergewöhnliche Kraftübertragung auf die Pedale, wenn du auf dem Rad sitzt</li><li>Flexibler Vorfuß und abgeschrägte Ferse bieten die Agilität, die du brauchst, wenn du vom Rad steigst</li><li>Außensohle aus Karbongummi sorgt für hervorragende Traktion und Schlammabweisung</li><li>Atmungsaktives Obermaterial aus Mesh/Synthetik sorgt für kühlende Belüftung, wenn es heiß hergeht</li><li>Niedrig geschnittenes Design für eine leichte, schnelles Tragegefühl</li><li>Das Schnürsystem hält den Schuh fest an seinem Platz</li></ul>"
