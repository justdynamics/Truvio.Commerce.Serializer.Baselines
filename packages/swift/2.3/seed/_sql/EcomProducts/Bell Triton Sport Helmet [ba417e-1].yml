"ProductName": "Bell Triton Sport Helmet"
"ProductShortDescription": |
  <p>Big heads usually constitute bigger brains. And if there&rsquo;s any heads out there we need to protect, it most certainly is those!</p>
"ProductLongDescription": |
  <ul>
  	<li>Fusion In-Mold Microshell with a larger design offers protection and durability for whatever the road or trail dishes out</li>
  	<li>17 vents bring cool air in through the front, allowing it to pass over your head and then flushes warm air out of the rear ports – so YOU stay cool and your HEAD stays cool</li>
  	<li>Snap-In visor protects your eyes from the sun, rain and any other debris that might fly your way</li>
  	<li>ErgoDial fit system provides easy, one-handed adjustment and the Cam-Lock levers deliver a perfect fit</li>
  </ul>
