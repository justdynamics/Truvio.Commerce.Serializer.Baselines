"ProductName": "Schwinn Sid Coasting Bike"
"ProductShortDescription": "<p>Wenn Sie eine Lufttaufe wollen, dann ist dies Ihr Bike. Dieses Bike überwindet nicht nur große Sprünge mit Leichtigkeit, sein robuster Chromoly-Rahmen fühlt sich auch fast schwerelos an, wenn du dich vom Boden abhebst! Füge 100 mm Vorderradfederung hinzu, um die Sprünge abzufedern, und 3-teilige Kurbeln für den süßen Barspin, und du hast ein Bike, das alles auf dem Boden und in der Luft bewältigen kann.</p>"
"ProductLongDescription": "<ul><li>Schwinn Classic Sport Rahmendesign mit Schwinn Tourister Lenker bringt Sie in eine natürliche, aufrechte Position für komfortables Fahren</li><li>Kettenschutz, Stahlschutzbleche und Ständer sorgen dafür, dass Ihr Fahrrad immer gut aussieht</li><li>Shimano Coasting Komponenten mit einer 3-Gang-Automatikschaltung und Rücktrittbremse nehmen das Denken aus dem Gangwechsel heraus und sorgen für sichere Stopps</li><li>Schwinn Sport Sattel bietet bequemen Halt für Ihren Hintern</li><li>Glatte Cruiser-Reifen sorgen für ein leichtes Rollen, Leichtgewichtige und korrosionsbeständige Leichtmetallräder mit Edelstahlspeichen sorgen für Langlebigkeit</li><li>Der Gepäckträger bietet Platz für alles, was Sie für einen Tag sorglosen Spaß brauchen</li></ul>"
