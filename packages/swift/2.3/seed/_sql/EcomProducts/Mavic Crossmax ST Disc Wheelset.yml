"ProductName": "Mavic Crossmax ST Disc Wheelset"
"ProductShortDescription": |
  <p>High strength and low inertia come together to give you the perfect wheels for epic rides on technical trails</p>
"ProductLongDescription": |
  <ul>
  	<li>Maxtal ISM lightened with SUP welded rims for serious weight reduction, less vibration and fewer flats over rough terrain</li>
  	<li>Fore technology adds greater rigidity and stiffness to the rims for those times when you&rsquo;re going all out!</li>
  	<li>FTS-X cassette body with strengthened prawls and self-locking axle end screws are designed to meet the demands of hard wearing, MTB riding</li>
  	<li>QRM sealed cartridge bearings produce low friction and are easy to maintain</li>
  	<li>24 Zicral, straight pull spokes reduce tension cycles, balance spokes tensions from side to side, reduce material fatigue and improve wheel endurance</li>
  	<li>Shimano 8/9-speed compatible</li>
  	<li>Compatible with UST and standard tires/tubes</li>
  </ul>
