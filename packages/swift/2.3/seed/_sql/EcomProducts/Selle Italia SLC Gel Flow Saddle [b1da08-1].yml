"ProductName": "Selle Italia SLC Gel Flow Saddle"
"ProductShortDescription": |
  <p>Don&rsquo;t let this saddle&rsquo;s slick looks distract you. Lightweight and spec&rsquo;d to impress, this pro-level saddle will amaze you with its incredible comfort!</p>
"ProductLongDescription": |
  <ul>
  	<li>30% carbon composite shell is anatomically designed for a perfect fit while offering a premium, vibration damping ride</li>
  	<li>Selle Italia&rsquo;s special cut-out begins at the back of the saddle, allowing the right and left sides to move independently from each other - this mimics the natural pedaling motion while allowing more flex on the saddle and around the sit bones</li>
  	<li>Silicone gel inserts with differentiated thickness are strategically placed around the anatomical cut out to improve comfort and relieve pressure in the frontal soft tissue area</li>
  	<li>Perfect Fit padding adheres to your body for additional support</li>
  	<li>Breathable, full-grain leather cover</li>
  	<li>Vanox tubular rails with carbon wrapping deliver smooth and lightweight performance</li>
  </ul>
