"ProductShortDescription": "<p>Diese Modelle sind in zwei verschiedenen Rahmenoptionen erh&auml;ltlich. Ein Carbon-Frontend kombiniert mit einem 6061-Aluminium-Heck oder ein preisg&uuml;nstigeres Vollaluminium-Chassis. Diese Modelle sind in zwei verschiedenen Rahmenoptionen erh&auml;ltlich. Ein Carbon-Frontend kombiniert mit einem 6061-Aluminium-Heck oder ein preisg&uuml;nstigeres Vollaluminium-Chassis. Diese Modelle sind in zwei verschiedenen Rahmenoptionen erh&auml;ltlich. Ein Carbon-Frontend kombiniert mit einem 6061-Aluminium-Heck oder ein preisg&uuml;nstigeres Vollaluminium-Chassis.</p>"
"ProductLongDescription": |-
  <p><strong>SHIMANO'S EP8</strong>: Ausgestattet mit dem neuen EP8-Motor von Shimano STePS. Es bietet eine gesteigerte Leistung von 85 Nm, weniger Gewicht, eine weitere Reduzierung der Baugr&ouml;&szlig;e und weniger Reibung. Dar&uuml;ber hinaus bietet der neue interne Akku eine gr&ouml;&szlig;ere Reichweite und superschnelle Ladem&ouml;glichkeiten.</p>
  <p><strong>INTERNER BLOCK</strong>: Die 2015 erstmals eingef&uuml;hrte E-Bike-Version des &bdquo;Internal Block&ldquo; ist direkt in den Rahmen integriert und verhindert, dass die Gabelkrone bei einem Sturz oder einem extremen Lenkwinkel auf den Rahmen trifft. Als zus&auml;tzlichen Schutz sind am Rahmen zus&auml;tzliche Gummipuffer angebracht, um eine Besch&auml;digung des Rahmens durch die Gabelkrone zu vermeiden.</p>
  <p><strong>SATELLITENANSCHL&Uuml;SSE</strong>: Das eONE-SIXTY verf&uuml;gt &uuml;ber einen perfekt positionierten Satelliten-Ein/Aus-Schalter am Steuerrohrende des Oberrohrs und einen gut gesch&uuml;tzten Satelliten-Ladeanschluss, der im Hauptrahmendreieck direkt &uuml;ber dem Motor positioniert ist.</p>
  <p><strong>CLEVERE R&Auml;DER</strong>: Um den vollgefederten E-Bikes ein pr&auml;zises Lenkverhalten, ein fantastisches &Uuml;berrollverhalten bei Hindernissen und dennoch maximale Traktion zu erm&ouml;glichen, haben wir ein 29er-Vorderrad mit einem 2,5-Zoll-Reifen und ein 650B-Hinterrad, ausgestattet mit einem etwas breiteren 2,6-Zoll-Reifen, kombiniert. Reifen. Die perfekte Kombination aus Pr&auml;zision, Verspieltheit und Traktion.</p>
  <p><strong>THERMO GATE</strong>: Speziell platzierte &Ouml;ffnungen bei den Carbon-Modellen in der N&auml;he des Steuerrohrs, die wie ein Kamin funktionieren und die warme Luft entweichen lassen, um eine optimale Betriebstemperatur des internen Akkus zu gew&auml;hrleisten. Das &bdquo;Thermo Gate&ldquo; sorgt daf&uuml;r, dass der Akku unter allen Bedingungen die beste Leistung erbringt.</p>
  <p><strong>WASSERTR&Auml;GER</strong>: Aufgrund des integrierten Akkus konnten wir Befestigungspunkte f&uuml;r Wasserflaschenhalter anbieten, sodass Flaschen oder Zubeh&ouml;r wie ein Schloss oder eine Pumpe am Rahmen im Hauptrahmendreieck angebracht werden k&ouml;nnen. Ideal, wenn Sie Ihren R&uuml;cken frei von Trinkrucks&auml;cken und Rucks&auml;cken halten m&ouml;chten.</p>
  <p><strong>CARBON ODER ALUMINIUM</strong>: Diese Modelle sind in zwei verschiedenen Rahmenoptionen erh&auml;ltlich. Ein Carbon-Frontend kombiniert mit einem 6061-Aluminium-Heck oder ein preisg&uuml;nstigeres Vollaluminium-Chassis.</p>
