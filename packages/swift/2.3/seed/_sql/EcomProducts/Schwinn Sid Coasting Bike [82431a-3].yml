"ProductName": "Schwinn Sid Coasting Bike"
"ProductShortDescription": "<p>Als je een luchtdoop wilt, dan is dit je fiets. Niet alleen gaat deze fiets moeiteloos over grote sprongen, het sterke chromoly frame voelt bijna gewichtloos aan als je van de grond af bent! Voeg daar 100 mm voorvering aan toe om de valpartijen op te vangen en 3-delige cranks voor die heerlijke barspin, en je hebt een fiets die alles aankan, zowel op de grond als in de lucht.</p>"
"ProductLongDescription": "<ul><li>Schwinn Classic Sport-framedesign met Schwinn Tourister stuur brengt u in een natuurlijke rechte positie voor comfortabel rijden</li><li>Scherm, stalen spatborden en kickstand zorgen er samen voor dat uw fiets er op zijn best uit blijft zien</li><li>Shimano Coasting-componenten met een automatisch schakelsysteem met 3 versnellingen en terugtraprem zorgen ervoor dat u niet hoeft na te denken over schakelen en dat u zeker tot stilstand komt</li><li>Schwinn Sport-zadel biedt zachte ondersteuning voor uw billen</li><li>Soepele cruiserbanden zorgen voor een gemakkelijke rol, comfortabele ervaring</li><li>Lichte en corrosiebestendige lichtmetalen wielen met roestvrijstalen spaken zorgen voor duurzaamheid</li><li>Achterrek biedt plaats aan alles wat je nodig hebt voor een dag zorgeloos plezier</li></ul>"
