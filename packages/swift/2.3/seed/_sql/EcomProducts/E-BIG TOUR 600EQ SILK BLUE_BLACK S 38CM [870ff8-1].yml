"ProductName": "E-BIG TOUR 600EQ SILK BLUE/BLACK S 38CM"
"ProductShortDescription": "<p><strong>MOUNTAIN BIKE TREKKING AT ITS BEST&thinsp;</strong><br>The eBIG.TOUR EQ combines the best of two worlds in the MERIDA line-up. From the outside a mountain bike but a trekking bike at heart. With a frame based on the eBIG.NINE, a suspension fork and wider 29er MTB tyres, the bike delivers a more comfortable riding feeling than a conventional trekking bike. However, as it comes fully equipped with fenders, carrier and lights, it is ideal for all tasks and duties you normally expect from a trekking bike or hybrid. The heavily bent down top tube offers incredible stand over height for easy mount and dismount.</p>"
"ProductLongDescription": "<p>MEHR KRAFT UND REICHWEITE - Der EP8-Motor von Shimano bietet eine perfekt abgestimmte Kraftentfaltung mit bis zu 85 Nm und hat Größe, Gewicht, Geräuschentwicklung und Motorwiderstand weiter verbessert. Der neue 630-Wh-Akku ist perfekt in das hydrogeformte Unterrohr integriert und liefert eine beeindruckende Reichweite für noch längere Umwege nach Hause.</p><p>GO BIG - Das eBIG.TOUR EQ rollt auf 29er-Laufrädern, die ein fantastisches Verhalten beim Überrollen von Hindernissen haben. Serienmäßig ist es mit 2,2&quot; breiten Reifen ausgestattet, die viel Grip und Komfort bieten. Wenn keine Schutzbleche montiert sind, können die Reifen bis zu 2.35&quot; gehen, was die Fahreigenschaften im Gelände noch weiter verbessert.</p><p>Wasserträger - Der eBIG.TOUR EQ Rahmen bietet die Möglichkeit, eine Wasserflasche oder weiteres Zubehör wie ein Schloss oder eine Pumpe in zwei verschiedenen Positionen zu montieren. Eine befindet sich oben auf dem Unterrohr, die zweite unterhalb des Oberrohrs. Dies gibt dem Fahrer neben der Möglichkeit, Flaschenhalter zu montieren, auch die Option, z.B. ein Faltschloss oder eine Pumpenhalterung zu montieren. </p><p>SYSTEMGEWICHT - Das Systemgewicht eines Fahrrads ist das kombinierte Gewicht von Fahrrad, Fahrer und zusätzlichem Gepäck. Das zulässige Systemgewicht beträgt 140 kg. Da ein E-Bike bereits schwerer ist als ein normales Fahrrad und zudem den Transport größerer Gepäckstücke erleichtert, ist es zwingend erforderlich, ein höheres Gesamtsystemgewicht zu zertifizieren. Alle MERIDA e-Bikes sowie alle verwendeten Komponenten durchlaufen ein strenges und e-Bike-spezifisches Testprogramm, das die höheren Kräfte und Belastungen nachahmt, um dem Fahrer ein Höchstmaß an Sicherheit zu garantieren.</p><p>RICHTIGE FEDERBÄNDE - 100 mm Federweg vorne bieten viel Komfort und gleichzeitig genügend Reserven, wenn man den Heimweg abseits der Straße wählt. Schließlich ermutigen e-MTBs den Fahrer, wann immer möglich \"abseits ausgetretener Pfade\" zu fahren.</p>>"
