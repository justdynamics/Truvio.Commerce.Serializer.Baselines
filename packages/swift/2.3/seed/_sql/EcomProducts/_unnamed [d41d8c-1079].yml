"ProductShortDescription": "<Idéal pour les pistes cyclables, les routes de campagne et les escapades en ville, ce vélo facile à conduire utilise une géométrie cross/confort, des supports de disques à l'intérieur des haubans et des pneus semi-agressifs pour vous offrir un confort et des performances exceptionnels où que vous rouliez."
"ProductLongDescription": |-
  <ul>
  <li>Le cadre en aluminium Mongoose avec géométrie cross/confort vous place dans une position plus droite pour faciliter le pédalage</li>.
  <li>La suspension avant à ressort pneumatique de 63 mm vous offre un confort moelleux sur les terrains accidentés</li>
  <li>Les manivelles triples FSA Alpha Drive avec transmission SRAM/SR Suntour offrent des tonnes d'options de vitesse pour les collines et les plats</li>.
  <li>Le guidon, la tige de selle et la potence en aluminium Mongoose offrent une solidité, un style et des performances de haut niveau</li>
  <li>Les freins à disque mécaniques Tektro IO offrent une puissance de freinage rapide et contrôlée dans toutes les conditions</li>
  <li>Les pneus SpeedMax Delta de Ritchey vous maintiennent fermement sur le sentier ou la route</li>
  <li>Les jantes Alex durables avec les moyeux à disque Formula maintiennent la force et la rigidité peu importe ce que vous rencontrez</li>
  <li>Les poignées Ergo Comfort Dual Density et la selle Mongoose Performance Hybrid offrent un rembourrage supplémentaire</li>
  </ul>
