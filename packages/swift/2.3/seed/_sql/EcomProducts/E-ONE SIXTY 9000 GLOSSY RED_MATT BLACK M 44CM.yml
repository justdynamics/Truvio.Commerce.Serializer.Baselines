"ProductName": "E-ONE SIXTY 9000 GLOSSY RED/MATT BLACK M 44CM"
"ProductShortDescription": "<p><strong>eONE-SIXTY - AWARD WINNING POWER</strong><br>Our multiple award-winning electric enduro bike. The perfect combination of the Shimano STEPS power unit and the modern geometry of our One-Sixty MTB guarantee our eOne-Sixty a powerful, natural riding feel. MBR Magazine stated, \"Merida has done an amazing job with the eOne-Sixty 900E. It has a fun, playful quality that few eBikes can match\".&nbsp; xxYY</p>"
"ProductLongDescription": "<p><strong>FLOAT LINK SUSPENSION - </strong>The lower shock mount moves with the system to deliver plushness and pedalling efficiency. Our engineers can precisely influence the transmission ratio and progression, which means that a &lsquo;Float Link&rsquo; system is very sensitive, delivering great support in mid-travel and the appearance of more travel that the model name suggests. The rear end creates the feeling of almost bottomless travel whilst remaining perfectly controlled when climbing.<br /><strong>PROVEN DESIGN - </strong>Our ONE-SIXTY remains one of the biggest showstoppers in our full suspension range. Fully at home on the demanding tracks of the Enduro World Series, ridden by Toni Ferreiro, our ONE-SIXTY has also gained press accolades. FLOW calls it &lsquo;a genuine contender as the best trail bike we&rsquo;ve ridden at this price point&rsquo; and &lsquo;it just looked right &ndash; the right angles, the right components, at the right price.&rsquo;<br /><strong>TRUNNION MOUNT - </strong>A trunnion mount shock gives our frame designers more flexibility by using a shorter shock with increased stroke. Combined with the ball bearing bushing of the upper mount, shock sensitivity is increased, and the suspension performance can be perfectly tuned.<br /><strong>CARBON OR ALUMINIUM - </strong>These models are available in two different frame options. A carbon front end combined with a 6061 aluminium rear end, or a more budget-friendly all-aluminium chassis.<br /><strong>AGGRESSIVE GEOMETRY - </strong>Race-proven and loved by the international cycling press, our ONE-SIXTY combines super short 430 mm chainstays for increased agility and playfulness, with a long reach, slack head angles and a low centre of gravity, delivering an aggressive enduro geometry.<br /><strong>BOOST TECHNOLOGY - </strong>Most models offer Boost technology at the front and rear. The shallower axle standard of 110 mm (front) and 148 mm (rear) allows for a wider spoke angle, resulting in a stiffer and stronger wheel, hugely beneficial on these bikes given the impacts they endure. The BIG.TRAIL 200 has 100 mm fork spacing.</p>"
