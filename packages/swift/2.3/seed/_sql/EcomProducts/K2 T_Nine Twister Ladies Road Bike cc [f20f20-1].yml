"ProductShortDescription": |
  <p>New, compact double gearing makes this advanced road bike lighter and easier to shift for 2008!</p>
"ProductLongDescription": |
  <ul>
  	<li>Lighter, more compliant ride thanks to a butted frame with Reflex Road tubing</li>
  	<li>T:Nine design gives all women riders a customized fit and look</li>
  	<li>Slim, carbon seatstays and T:Nine tuned fork smooth out the road ahead</li>
  	<li>K2 Bike Fit System stem supplies personalized bar height without the extra weight</li>
  	<li>Shimano Tiagra/SRAM 18-speed drivetrain with FSA Gossamer compact cranks offer plenty of quick, easy and efficient gearing options for the climbs</li>
  	<li>S.T.I. shifters with reach adjust and T:Nine tuned handlebar improves riding confidence</li>
  	<li>Selle San Marco Women&rsquo;s Ischia saddle with T:Nine tuned seatpost adds personalized comfort</li>
  	<li>Tektro dual-pivot brakes provide quick and easy stops</li>
  	<li>Crank Brothers Smarty clipless pedals deliver more power in every rotation</li>
  	<li>Lightweight, A-Class wheelset with color-matched, Vittoria Rubino tires for a high level of control, response and lateral rigidity</li>
  </ul>
