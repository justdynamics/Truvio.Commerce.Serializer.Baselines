"ProductName": "K2 Enemy Cyclocross Bike 2008 cc"
"ProductShortDescription": |
  <p>A keenly honed cyclocross weapon which doubles as a spirited commuter on weekdays!</p>
"ProductLongDescription": |
  <ul>
  	<li>Butted cross frame with Reflex Road tuning gives you a lightweight and resilient ride</li>
  	<li>Carbon bladed fork smoothes out rough trails and bumpy roads</li>
  	<li>K2 Bike Fit System stem supplies personalized bar height without the extra weight</li>
  	<li>Shimano 105 20-speed drivetrain with FSA Omega compact cranks offer plenty of easy and efficient gearing options for the climbs</li>
  	<li>Gear indicators in the Shimano 105 S.T.I. shifters eliminate shifting confusion</li>
  	<li>Selle San Marco Ponza K saddle with Kevlar rear panels add comfort while preventing scrapes and scuffs</li>
  	<li>Kore Kross Race cantilevers combine excellent mud clearance with powerful stopping performance</li>
  	<li>Vittoria Cross XG Pro tires supply traction and control in the mud and dirt</li>
  	<li>Aerodynamic, Alex ALX 220 wheelset provides an excellent strength to weight ratio - perfect for training or commuting</li>
  	<li>Rear rack mounts let you add a rack when you need to transport extra gear</li>
  </ul>
