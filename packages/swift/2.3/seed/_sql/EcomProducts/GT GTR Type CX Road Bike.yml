"ProductName": "GT GTR Type CX Road Bike"
"ProductShortDescription": |
  <p>If you&rsquo;re a weekend warrior or a hard-riding enthusiast looking for a CX bike that&rsquo;s built to withstand some serious abuse, then this is your ride! GT&rsquo;s Cyclocross frame design offers exceptional strength and fatigue resistance while the SRAM 20-speed drivetrain will have you cycling in the dirt, on the road, up steep inclines and down vertical descents with incredible speed.</p>
"ProductLongDescription": |
  <ul>
  	<li>GT Cyclocross frame design with butted Kinesis Kinesium aluminum is stronger than 6061 or 7005 series and delivers a ride that&rsquo;s lightweight, rigid and exceptionally stable</li>
  	<li>Easton EC70 XC fork with carbon blades offers the perfect blend of strength and stiffness for CX riding</li>
  	<li>SRAM Rival drivetrain is built for serious and competitive riders who hammer on their gear day in and day out and demand technology that&rsquo;s durable and long-lasting</li>
  	<li>TruVativ Rouleur cranks provide reliable speed and a powerful pedal stroke</li>
  	<li>SRAM Rival DoubleTap controls utilize a single lever for shifting and a dedicated lever for braking to provide smooth up and downshifting in ONE motion</li>
  	<li>Easton EA70 handlebars, stem and seatpost deliver core-level strength, style and performance</li>
  	<li>Tektro 720 Cantilever brakes with a retro design give you excellent and stylish stopping power</li>
  	<li>Easton Vista SL wheelset with Panaracer Cinder X tires offer incredible speed, grip and performance in wet or dry conditions</li>
  </ul>
