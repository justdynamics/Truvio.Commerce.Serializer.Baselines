"ProductName": "K2 T:Nine Alliance Ladies Road Bike cc"
"ProductShortDescription": "<p>An enthusiastic, road-ready bike inspired and developed by K2’s T:Nine Alliance Team!</p>"
"ProductLongDescription": "<ul><li>Butted 6061 aluminum frame with Reflex Road tuning for a lightweight and resilient ride</li><li>T:Nine design gives all women riders a customized fit and look</li><li>Smooth welded, carbon seatstays and fork smooth out the road ahead</li><li>K2 Bike Fit System stem supplies personalized bar height without the extra weight</li><li>Shimano 105 20-speed drivetrain with R600 compact cranks offer plenty of easy and efficient gearing options for the climbs</li><li>Shimano R700 brake/shift levers (Ultegra-level) with reach adjust are mounted on the T:Nine tuned handlebar to accommodate smaller hands for easier stops and gear changes</li><li>Selle San Marco Women’s Ischia saddle with T:Nine tuned, carbon seatpost adds personalized comfort - a favorite of the Alliance Team</li><li>FSA Gossamer dual-pivot brakes provide quick and easy stops</li><li>Crank Brothers Smarty clipless pedals deliver more power in every rotation</li><li>Continental Ultra Race tires for comfort and exceptional handling, especially on rough or wet road surfaces</li><li>American Classic Victory wheelset blends together strength, light weight and performance to give you a smooth, responsive ride in race conditions</li></ul><p></p>"
