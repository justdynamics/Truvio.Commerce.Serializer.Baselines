"ProductName": "GTR Pro Rival Road Bike"
"ProductShortDescription": "<p>GT’s new radical and high performing GTR Pro Rival road bike pushes the tech envelope with cutting-edge looks and state of the art componentry. With a forced-optimized carbon chassis and SRAM Rival gruppo, this 17lb. thoroughbred is sure to place at the top of its class!</p>"
"ProductLongDescription": "<ul><li>GTR carbon monocoque frame with Ritchey Pro Carbon fork delivers a smooth, lightweight and vibration damping ride</li><li>Full SRAM Rival drivetrain is built for serious and competitive riders who hammer on their gear day in and day out and demand technology that’s durable and long-lasting</li><li>Ritchey aluminum handlebar and stem with carbon seatpost provide lightweight stiffness and have been perfectly positioned for race-ready performance</li><li>SRAM Rival DoubleTap controls utilize a single lever for shifting and a dedicated lever for braking to provide smooth up and downshifting in ONE motion</li><li>SRAM Rival dual pivot brakes provide excellent stopping power in any condition and enhance progressive feel</li><li>Shimano 105 wheelset paired with Vittoria Rubino Pro tires give you a high level of control, response and lateral rigidity for high mileage training</li></ul><p></p>"
