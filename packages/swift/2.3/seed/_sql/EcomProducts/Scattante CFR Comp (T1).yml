"ProductName": "Scattante CFR Comp (T1)"
"ProductShortDescription": |
  <p>&ldquo;Competition&rdquo; is the name of the game according to this ride! Its lightweight carbon monocoque frame with revolutionary Composite Bladder Molding and Aerospace Composite structure gives you cutting-edge performance that&rsquo;s laterally stiff, vertically resilient and fast in feel. And with Shimano&rsquo;s precision 105 drivetrain, the added climbing power of FSA carbon cranks and a lightweight wheelset to top it off, there&rsquo;s no tellin&rsquo; how many wins this ride&rsquo;s gonna bring home!</p>
"ProductLongDescription": |
  <ul>
  	<li>Lightweight carbon monocoque frame with carbon/aluminum fork offers a stiff and efficient ride with less vibration</li>
  	<li>Shimano 105 drivetrain with Ultegra rear derailleur combines reliable speed and high performance with incredible control and response</li>
  	<li>FSA SLK Light Carbon cranks with MegaExo bottom bracket deliver super-stiff, no-flex pedaling power for the road ahead</li>
  	<li>Oversized Forté Precision handlebar and stem supply core-level strength, style and performance</li>
  	<li>Kenda Forté Pro DC tires give you speed when you want it and traction when you need it, in wet or dry conditions</li>
  	<li>Alex ALX 270 wheelset cut through the wind with bladed spokes, aero rims and smooth rolling hubs</li>
  	<li>Tektro R740 dual pivot calipers deliver strong, progressive stopping power and good modulation</li>
  </ul>
