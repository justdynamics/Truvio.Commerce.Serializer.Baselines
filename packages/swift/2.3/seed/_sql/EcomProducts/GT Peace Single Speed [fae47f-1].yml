"ProductName": "GT Peace Single Speed "
"ProductShortDescription": "<p>So fast. So agile. So stable. So comfortable. So simple. Just hop on the light and durable chromoly frame, settle your tush into the comfy saddle, place your feet on the pedals and let the single speed drivetrain do all the work for you. Get going too fast? No problem. One pull the brake levers and the mechanical discs will slow you right down. And the tires? They’re ready to take you through all sorts of terrain. Trust us. You’re in for the ride of your life!</p>"
"ProductLongDescription": "<ul><li>GT Triple Triangle Single Speed chromoly frame and fork delivers a lightweight, durable and stiff ride</li><li>Single speed drivetrain with 18T rear cog is simple and uncomplicated to maintain</li><li>TruVativ cranks and bottom bracket give you an easy, yet powerful pedal stroke</li><li>Tektro Aquila mechanical disc brakes offer excellent stopping power in any condition</li><li>WTB SpeedDisc rims with ExiWolf tires are built to withstand all sorts of abuse</li></ul><p></p>"
