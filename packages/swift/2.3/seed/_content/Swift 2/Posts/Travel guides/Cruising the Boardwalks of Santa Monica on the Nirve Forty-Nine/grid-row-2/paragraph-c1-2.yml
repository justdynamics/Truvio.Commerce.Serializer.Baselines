  "Subtitle": "<p class=\"dw-paragraph-1\">A Vintage Ride for Sun, Sand, and Ocean Breeze</p>"
  "Text": "<p>The wide, sun-washed boardwalks of Santa Monica, California, are a dream come true for fans of stylish cruising—and there’s no better companion than the Nirve Forty-Nine 3-Speed. With its vintage-inspired frame and relaxed geometry, it’s perfect for gliding between the pier, beach cafés, and artisan markets.</p><p>You’ll appreciate the 3-speed gearing when you leave the coastline and head uphill toward the bluffs or traverse the paths to Venice Beach. The plush saddle and upright riding position make this a comfortable ride no matter how long you’re in the saddle.</p><p>Whether it’s a morning ride with a cold brew in your basket or a sunset cruise by the waves, the Nirve Forty-Nine brings retro flair and practical comfort to your coastal adventures.</p>"
