  "Subtitle": "<p class=\"dw-paragraph\">A Folding Bike Built for Coastal Freedom and Convenience</p>"
  "Text": "<p>The Montague 34XZA is the travel-friendly bike built for jet setters—and there’s no better place to ride it than the south of France. Fold it up and take it on the TGV train from Nice to Cannes, then unfold it for a seaside ride along the Promenade de la Croisette.</p><p>With a sturdy build and full-sized wheels, this isn’t your average folding bike. It rides like a traditional hybrid but stows in your apartment or hotel room with ease.</p><p>Whether exploring cliffside cafés or rolling past luxury yachts, the 34XZA lets you travel light without missing a pedal stroke.</p>"
