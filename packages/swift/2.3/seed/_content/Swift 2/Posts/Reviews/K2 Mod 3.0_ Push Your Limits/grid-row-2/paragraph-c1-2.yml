  "Subtitle": "<p class=\"dw-paragraph-1\">A High-Performance Road Machine for Ambitious Cyclists</p>"
  "Text": "<p>Designed for those who live for the road, the K2 Mod 3.0 Road Bike is an exceptional machine for performance-driven cyclists. Featuring a lightweight, aerodynamic alloy frame, carbon fork, and race-ready geometry, this bike is built to go fast and handle sharp.</p><p>Top-tier components, smooth-shifting drivetrain, and responsive brakes keep you in control whether you’re sprinting in a race or hammering out interval sessions. Climb higher, descend faster, and push your personal limits with confidence on the Mod 3.0.</p><p>Ideal for riders looking for a serious performance upgrade without breaking the bank, the K2 Mod 3.0 bridges the gap between enthusiast and competitive levels.</p>"
