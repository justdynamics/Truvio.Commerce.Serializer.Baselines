  "Subtitle": "<p class=\"dw-paragraph-1\">A Playful Cruiser with Retro Vibes</p>"
  "Text": "<p>Let your personality shine with the Nirve Paul Frank Aku Single Speed. Bright graphics, iconic Paul Frank artwork, and a smooth, relaxed ride make this cruiser stand out in any crowd. Whether you&#39;re heading to the beach, grabbing coffee with friends, or cruising along the boardwalk, this bike brings the fun factor.</p><p>Built for comfort and style, its upright geometry, wide handlebars, and padded seat invite relaxed pedaling. The single-speed drivetrain keeps things simple, letting you focus on the scenery, not the gears.</p><p>Low-maintenance and full of charm, the Paul Frank Aku is a delightful choice for anyone wanting a bike that brings joy to everyday rides. Who says a bike can’t have personality?</p>"
  "Title": "<h2 class=\"dw-h2\">Cruise with a Smile on the Nirve Paul Frank Aku</h2>"
