  "Subtitle": "<p class=\"dw-paragraph-1\">Performance and Durability for Mountain Enthusiasts</p>"
  "Text": "<p>Trail enthusiasts, meet your new favorite ride: the Mongoose Tyax Comp Disc (T3). This rugged mountain bike is built to handle everything from winding singletracks to rocky descents. A premium alloy frame ensures durability while keeping weight low, giving you nimble handling in tight corners and confidence on technical terrain.</p><p>The suspension system smooths out roots and rocks, allowing you to maintain speed and control. Its hydraulic disc brakes offer powerful stopping power even in muddy or steep conditions. Whether you’re climbing forest paths or shredding downhill, the Tyax Comp responds with sharp handling and robust performance.</p><p>Perfect for riders ready to progress their off-road skills, this bike blends value, performance, and durability. Take it on your next adventure — the trails are calling!</p>"
  "Title": "<h2 class=\"dw-h2\">Conquer Any Terrain with the Mongoose Tyax Comp Disc</h2>"
