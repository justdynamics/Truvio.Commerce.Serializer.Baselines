  "Subtitle": "<p class=\"dw-paragraph-1\">A Vintage Cruiser for Relaxed Urban Adventures</p>"
  "Text": "<p class=\"dw-paragraph\">The Nirve Forty-Nine 3-Speed Cruiser Bike offers more than just mobility — it invites you to slow down and enjoy life on two wheels. With its timeless vintage styling, elegantly curved frame, and bold color options, it makes every outing feel like a stylish occasion.</p><p class=\"dw-paragraph\">Comfort is at the heart of this design. Wide swept-back handlebars, plush saddle, and an upright riding posture allow you to cruise with ease. The intuitive 3-speed hub gearing helps you glide over gentle hills and along city streets, with minimal effort and maximum fun.</p><p class=\"dw-paragraph\">Ideal for casual city jaunts, beachside rides, or weekend explorations, the Forty-Nine’s low-maintenance components mean you’ll spend less time on upkeep and more time enjoying the ride. The sturdy build quality and quality parts ensure reliability for years to come.</p><p></p>"
