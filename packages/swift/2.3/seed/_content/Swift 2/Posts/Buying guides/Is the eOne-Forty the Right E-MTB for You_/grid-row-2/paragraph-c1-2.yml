  "Subtitle": "<p class=\"dw-paragraph-1\">A Smart Buy for Riders Who Love Singletrack and Variety</p>"
  "Text": "<p>Not all e-MTBs are built for high-speed descents and massive jumps. The eOne-Forty is made for those who love technical trails, tight corners, and all-day adventures that involve both climbing and descending. If your weekend rides include a mix of trail types, this might be your perfect match.</p><p>With 140mm of travel in the rear and 150mm in the front, it offers just enough cushion without feeling sluggish. Plus, the mullet setup (29” front, 27.5” rear) adds a playful feel without sacrificing stability.</p><p>This bike is a great choice if you want to get into e-MTBs without jumping straight into an enduro platform. It balances power, fun, and value—perfect for trail riders who want to ride more, climb easier, and explore farther.</p>"
  "Title": "<h2 class=\"dw-h2\">Is the eOne-Forty the Right E-MTB for You?</h2>"
