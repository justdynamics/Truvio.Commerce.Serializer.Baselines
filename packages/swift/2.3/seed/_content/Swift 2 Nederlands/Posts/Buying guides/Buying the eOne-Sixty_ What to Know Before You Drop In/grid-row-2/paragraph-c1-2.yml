  "Subtitle": "<p class=\"dw-paragraph-1\">A High-End E-MTB for Enduro Fans and Gravity Addicts</p>"
  "Text": "<p class=\"dw-paragraph\">If you’re serious about enduro riding—or you want to explore more terrain without shuttle runs—the eOne-Sixty is Merida’s e-bike powerhouse. This bike is designed to crush climbs and dominate descents with aggressive geometry, big suspension travel, and confidence-inspiring control.</p><p class=\"dw-paragraph\">It’s best suited for experienced riders or newcomers to e-MTB who know they’ll be tackling steep, rugged, or technical terrain. With Shimano EP drive systems and 160/170mm travel, it can handle anything from bike park laps to alpine backcountry loops.</p><p class=\"dw-paragraph\">When shopping, be mindful of the component levels and battery range. You’ll want a spec that can keep up with your ambitions—especially if you plan to take it into remote terrain where reliability matters most.</p><p></p>"
