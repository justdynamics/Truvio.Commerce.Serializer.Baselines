  "Subtitle": "<p class=\"dw-paragraph-1\">Hybrid Versatility for City Commutes and Leisure</p>"
  "Text": "<p class=\"dw-paragraph\">Looking for a do-it-all bike that’s as comfortable on city streets as it is on weekend paths? The Mongoose Crossway 450 Disc Lady delivers. Designed specifically for female riders, its geometry promotes an upright, comfortable ride — perfect for everyday commutes, leisurely rides, or fitness journeys.</p><p class=\"dw-paragraph\">With lightweight frame construction and smooth-rolling tires, this hybrid bike moves effortlessly across a variety of surfaces. The reliable disc brakes ensure consistent stopping power in all weather — rain or shine — giving you confidence on every ride.</p><p class=\"dw-paragraph\">Thoughtful design touches, like ergonomic grips and a plush saddle, add to the overall comfort. Whether it’s your daily commute, an afternoon ride in the park, or an impromptu adventure, the Crossway 450 Lady is ready to go.</p><p></p>"
