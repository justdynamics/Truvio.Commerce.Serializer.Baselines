  "Subtitle": "<p class=\"dw-paragraph-1\">Photochromatic Lenses for Every Light Condition</p>"
  "Text": "<p>Cycling is about being prepared for changing conditions — and your eyewear should be too. The Tifosi Stelvio Fototec glasses feature photochromatic lenses that automatically adapt to changing light, offering crisp, clear vision whether you&#39;re riding at sunrise, through shaded forest paths, or under the bright afternoon sun.</p><p>The lightweight frame ensures all-day comfort, while anti-fog and vented lens design keep your view sharp even on climbs. The wraparound fit protects your eyes from wind, dust, and debris, making this eyewear ideal for road, gravel, and MTB alike.</p><p>For cyclists who ride in all weather and all light, the Tifosi Stelvio Fototec is the perfect lens solution.</p>"
