  "Subtitle": "<p class=\"dw-paragraph-1\">A Whimsical Cruiser for Fans of All Ages</p>"
  "Text": "<p>Bring a touch of nostalgia and style to your rides with the Nirve Hello Kitty Retro Single Speed. Designed for fans of this iconic character, the bike’s retro styling, pastel colors, and Hello Kitty details create a look that’s both charming and timeless.</p><p>Perfect for relaxed city rides, park loops, or casual beach cruising, this bike prioritizes comfort with an upright riding position and soft padded saddle. The sturdy steel frame and easy-rolling tires provide a smooth ride that invites you to slow down and enjoy the journey.</p><p>Whether you’re a lifelong Hello Kitty fan or simply looking for a fun and stylish cruiser, this bike adds delight to every outing. It’s a head-turner that brings smiles wherever it goes!</p>"
