  "Subtitle": "<p class=\"dw-paragraph-1\">A Hard-Hitting Hardtail Built for the Red Rock Playground</p>"
  "Text": "<p class=\"dw-paragraph\">Moab, Utah, is one of the most iconic mountain biking destinations in the world—and the Mongoose Tyax Comp Disc was built for this terrain. With its rugged alloy frame and responsive suspension, it’s made to tackle rocky climbs, desert singletrack, and technical descents.</p><p class=\"dw-paragraph\">Start with the Bar-M Loop to warm up, then take on Slickrock Trail or the flowy Navajo Rocks system. The Tyax’s hydraulic disc brakes offer confident control on steep terrain, while its geometry provides stability and control through switchbacks.</p><p class=\"dw-paragraph\">If you’re looking to explore challenging, adrenaline-pumping terrain in one of North America&#39;s most scenic desert environments, this hardtail is a reliable ride.</p><p></p>"
