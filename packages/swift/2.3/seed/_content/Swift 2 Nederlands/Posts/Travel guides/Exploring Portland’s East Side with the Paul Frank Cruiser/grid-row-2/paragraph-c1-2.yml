  "Subtitle": "<p class=\"dw-paragraph-1\">Color, Culture, and Coffee on a Whimsical Ride</p>"
  "Text": "<p class=\"dw-paragraph\">There’s no better way to experience the quirky energy of Portland, Oregon, than from the saddle of a Nirve Paul Frank Aku Single Speed. With its playful graphics and laid-back design, it’s as much a statement as it is a ride.</p><p class=\"dw-paragraph\">Cruise along the Eastbank Esplanade or meander through the Alberta Arts District, stopping at record stores, food trucks, and indie cafés. With flat terrain and abundant bike lanes, the city is perfect for single-speed cruising.</p><p class=\"dw-paragraph\">Bring your sense of style and a pannier for treats—this bike and city were made for each other.</p>"
  "Title": "<h2 class=\"dw-h2\">Exploring Portland’s East Side with the Paul Frank Cruiser</h2>"
