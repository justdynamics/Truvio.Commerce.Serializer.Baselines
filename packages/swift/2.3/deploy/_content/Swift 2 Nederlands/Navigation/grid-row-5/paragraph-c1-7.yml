  "Text": "<p><span style=\"font-size: 18pt;\">This is a classic Black Mountain trail and was featured in Freehub Magazine's Pisgah Photo Book: Issue 6. There is an optional drop 1/2 way down. The trails all run parallel to the Fountain Place paved road so they can be shuttled by car. Flow trail is a bit tight at the top, but gets really fast as you transition to the lower Rush. The climb up from Marlette Lake trail is pretty tough, but relatively short. This new trail flows well and has multiple banked berms and small jumps that wind down the mountainside. You can find everyone out here having fun from people in body armor and downhill bikes to families testing their kids limits to xc racer types riding intervals. From the young (or not so young) beginner, to the downhill pro, a flow trail delivers smiles for riders of all ages and skill level. Do not ride when wet and not if you are not a skilled rider.<br /><br /></span></p>\r\n<p><span style=\"font-size: 18pt;\">Drop in off a shallow rock slab and then whip through a few tight berms. This created a reroute of the single track. A few wet spots, but almost non-existent mud. It packs in a lot of excitement in a short amount of time. You'll need somebody to drop you off at the start and pick you up at the end. This is the third downhill only trail on the north side trail network. Two wheel drifting is likely if you have speed but are not riding the top few inches of the berms. Some wet/muddy creek crossings, but otherwise dry. You'll need somebody to drop you off at the start and pick you up at the end.</span></p>"
