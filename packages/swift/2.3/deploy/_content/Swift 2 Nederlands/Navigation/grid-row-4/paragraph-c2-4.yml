  "Text": "This ridge is more rugged than the other two ridges. Freeze-thaw cycle isn't awful, but does make this trail rather slick. A trail & parking area reconstruction project completed in July '17. It is typically maintained at a high level due to its popularity and use. More branches down and seems they are often in bad spots, i.e. landings. A steep, punchy switchback filled climb follows a set of spines from Ridgecrest Conference Center in Black Mountain, NC to the parking lot of Old Fort Picnic area.\r\n"
